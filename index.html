* { box-sizing: border-box; margin: 0; padding: 0; }

.sr-only {

/* ── Header ─────────────────────────────────────────────── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px clamp(16px, 4vw, 40px);
  border-bottom: 1px solid var(--dono-line);
  background: var(--dono-card);
}
.wordmark {
  font-family: var(--font-display);
  font-weight: 800; font-size: 26px; letter-spacing: -0.02em;
  color: var(--dono-brand); text-decoration: none;

}
.wordmark .dot { color: var(--dono-accent); }
.wordmark img { height: 30px; display: block; }
.header-note {
  font-size: 13px; color: var(--dono-ink-soft);
}
.header-note a { text-decoration: none; font-weight: 600; }
.header-note a:hover { text-decoration: underline; }

/* ── Layout ─────────────────────────────────────────────── */
main {
  flex: 1; width: 100%; max-width: 900px; margin: 0 auto;
  padding: clamp(20px, 4vw, 44px) clamp(16px, 4vw, 40px) 32px;
  display: flex; flex-direction: column;
}
.screen { animation: screenIn 260ms ease both; }
@keyframes screenIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

/* ── Landing ────────────────────────────────────────────── */
.landing { text-align: center; margin: auto 0; padding: 24px 0 48px; }
.landing h1 {
  font-family: var(--font-display); font-weight: 800;
  font-size: clamp(38px, 7vw, 64px); line-height: 1.05; letter-spacing: -0.02em;
}
.landing h1 .hi { color: var(--dono-brand); }
.landing h1 .lo { color: var(--dono-ink-soft); }
.landing .lede {
  max-width: 46ch; margin: 18px auto 8px; color: var(--dono-ink-soft); font-size: 17px;
}
.landing .dataset { font-size: 13px; color: var(--dono-ink-soft); margin-bottom: 34px; }
.mode-buttons { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
.mode-btn {
  flex: 1 1 240px; max-width: 300px; text-align: left;
  background: var(--dono-card); border: 2px solid var(--dono-line);
  border-radius: var(--radius); padding: 20px 22px; box-shadow: var(--shadow);
  transition: transform 140ms ease, border-color 140ms ease;
}
.mode-btn:hover { transform: translateY(-3px); border-color: var(--dono-brand); }
.mode-btn .mode-name {
  font-family: var(--font-display); font-weight: 700; font-size: 21px; display: block;
}
.mode-btn .mode-desc { font-size: 14px; color: var(--dono-ink-soft); display: block; margin-top: 4px; }
.mode-btn.sudden .mode-name { color: var(--dono-wrong); }
.mode-btn.normal .mode-name { color: var(--dono-brand); }
.best-line { margin-top: 22px; font-size: 14px; color: var(--dono-ink-soft); }
.best-line strong { color: var(--dono-ink); }

/* ── Status bar ─────────────────────────────────────────── */
.status-bar {
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  flex-wrap: wrap; margin-bottom: 18px;
}
.mode-chip {
  font-size: 12px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
  background: var(--dono-brand-soft); color: var(--dono-brand-dark);
  padding: 5px 12px; border-radius: 999px;
}
.stats { display: flex; gap: 18px; align-items: baseline; }
.stat { font-size: 14px; color: var(--dono-ink-soft); }
.stat b { font-family: var(--font-display); font-size: 20px; color: var(--dono-ink); margin-left: 6px; }
.stat.streak-hot b { color: var(--dono-brand); }
.streak-flame { color: var(--dono-accent); }
.end-run-btn {
  background: none; border: 1px solid var(--dono-line); border-radius: 999px;
  padding: 6px 14px; font-size: 13px; color: var(--dono-ink-soft);
}
.end-run-btn:hover { border-color: var(--dono-ink-soft); color: var(--dono-ink); }

/* ── Duel cards ─────────────────────────────────────────── */
.duel { display: grid; grid-template-columns: 1fr auto 1fr; gap: 14px; align-items: stretch; }
.uni-card {
  background: var(--dono-card); border: 1px solid var(--dono-line);
  border-radius: var(--radius); box-shadow: var(--shadow);
  padding: clamp(18px, 3vw, 30px); text-align: center;
  display: flex; flex-direction: column; justify-content: center; min-height: 210px;
}
.uni-name {
  font-family: var(--font-display); font-weight: 700;
  font-size: clamp(19px, 2.6vw, 25px); line-height: 1.2; text-wrap: balance;
}
.uni-country { font-size: 13px; color: var(--dono-ink-soft); margin-top: 6px; }
.uni-rank {
  font-family: var(--font-display); font-weight: 800;
  font-size: clamp(40px, 6vw, 58px); letter-spacing: -0.02em;
  color: var(--dono-brand); margin-top: 12px; line-height: 1;
}
.uni-rank .of { display: block; font-size: 12px; font-weight: 500; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--dono-ink-soft); margin-top: 6px; }
.uni-rank.hidden-rank { color: var(--dono-ink-soft); }
.uni-rank.revealing { animation: rankPop 320ms cubic-bezier(.2,.9,.3,1.4) both; }
@keyframes rankPop { from { opacity: 0; transform: scale(.6); } to { opacity: 1; transform: scale(1); } }

.vs-spine { display: flex; align-items: center; justify-content: center; }
.vs-badge {
  font-family: var(--font-display); font-weight: 800; font-size: 15px;
  background: var(--dono-ink); color: var(--dono-paper);
  border-radius: 999px; width: 44px; height: 44px;
  display: grid; place-items: center;
}

/* ── Guess buttons ──────────────────────────────────────── */
.guess-row { display: flex; gap: 14px; margin-top: 18px; }
.guess-btn {
  flex: 1; padding: 18px 10px; border-radius: var(--radius); border: none;
  font-family: var(--font-display); font-weight: 700; font-size: 20px;
  background: var(--dono-brand); color: #fff;
  transition: background 140ms ease, transform 140ms ease;
}
.guess-btn:hover:enabled { background: var(--dono-brand-dark); transform: translateY(-2px); }
.guess-btn:disabled { opacity: 0.45; cursor: not-allowed; }
.guess-btn .key-hint { display: block; font-family: var(--font-body); font-weight: 500; font-size: 12px; opacity: .8; margin-top: 3px; }
.guess-btn.lower { background: var(--dono-ink); }
.guess-btn.lower:hover:enabled { background: #000; }

/* ── Result panel ───────────────────────────────────────── */
.result-panel {
  margin-top: 18px; border-radius: var(--radius); padding: 16px 20px;
  display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap;
  border: 1.5px solid;
}
.result-panel.correct { background: var(--dono-correct-soft); border-color: var(--dono-correct); }
.result-panel.wrong { background: var(--dono-wrong-soft); border-color: var(--dono-wrong); }
.result-text { font-weight: 600; }
.result-text .verdict { font-family: var(--font-display); font-weight: 800; margin-right: 8px; }
.result-panel.correct .verdict { color: var(--dono-correct); }
.result-panel.wrong .verdict { color: var(--dono-wrong); }
.result-sub { display: block; font-weight: 400; font-size: 14px; color: var(--dono-ink-soft); margin-top: 2px; }
.result-actions { display: flex; align-items: center; gap: 12px; }
.points-chip {
  font-family: var(--font-display); font-weight: 800; font-size: 17px;
  padding: 6px 12px; border-radius: 999px; background: var(--dono-card);
}
.points-chip.gain { color: var(--dono-correct); }
.points-chip.loss { color: var(--dono-wrong); }
.next-btn {
  border: none; border-radius: 999px; padding: 12px 26px;
  background: var(--dono-ink); color: #fff; font-weight: 600; font-size: 15px;
}
.next-btn:hover { background: #000; }

/* ── Persistent in-game CTA / footer ────────────────────── */
.dono-footer {
  margin-top: auto; padding: 18px clamp(16px, 4vw, 40px);
  text-align: center; font-size: 13px; color: var(--dono-ink-soft);
  border-top: 1px solid var(--dono-line);
}
.dono-footer a { font-weight: 600; text-decoration: none; }
.dono-footer a:hover { text-decoration: underline; }

/* ── Game over ──────────────────────────────────────────── */
.over { text-align: center; margin: auto 0; padding: 20px 0 40px; }
.over .over-kicker {
  font-size: 13px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;

}
.over h2 {

  font-size: clamp(30px, 5vw, 44px); margin: 8px 0 26px; letter-spacing: -0.02em;
}
.over-stats {
  display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 30px;
}
.over-stat {
  background: var(--dono-card); border: 1px solid var(--dono-line);
  border-radius: var(--radius); padding: 16px 22px; min-width: 128px; box-shadow: var(--shadow);
}
.over-stat b { display: block; font-family: var(--font-display); font-size: 34px; font-weight: 800; color: var(--dono-brand); }
.over-stat span { font-size: 13px; color: var(--dono-ink-soft); }
.over-stat.record { background: var(--dono-accent); border-color: var(--dono-accent); }
.over-stat.record b, .over-stat.record span { color: var(--dono-ink); }
.over-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 34px; }
.btn-primary, .btn-secondary, .btn-cta {
  border-radius: 999px; padding: 13px 26px; font-weight: 600; font-size: 15px; border: none;
  text-decoration: none; display: inline-block;
}
.btn-primary { background: var(--dono-brand); color: #fff; }
.btn-primary:hover { background: var(--dono-brand-dark); }
.btn-secondary { background: var(--dono-card); color: var(--dono-ink); border: 1.5px solid var(--dono-line); }
.btn-secondary:hover { border-color: var(--dono-ink-soft); }
.cta-block {
  background: var(--dono-brand-soft); border-radius: var(--radius);
  padding: 24px; max-width: 560px; margin: 0 auto;
}
.cta-block p { font-size: 15px; margin-bottom: 14px; color: var(--dono-brand-dark); font-weight: 500; }
.btn-cta { background: var(--dono-brand); color: #fff; font-family: var(--font-display); font-weight: 700; }
.btn-cta:hover { background: var(--dono-brand-dark); }

/* ── Error state ────────────────────────────────────────── */
.error-box {
  margin: auto; max-width: 480px; text-align: center;

.error-box p { color: var(--dono-ink-soft); font-size: 15px; }

/* ── Responsive ─────────────────────────────────────────── */
@media (max-width: 640px) {
  .duel { grid-template-columns: 1fr; }

  .header-note { display: none; }

@media (prefers-reduced-motion: reduce) {

/** Parse raw CSV text into an array of row arrays (handles quoted fields). */
function parseCSV(text) {
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"') {
        if (text[i + 1] === '"') { field += '"'; i++; }
        else inQuotes = false;
      } else field += c;
    } else if (c === '"') {
      inQuotes = true;
    } else if (c === ',') {
      row.push(field); field = '';
    } else if (c === '\n' || c === '\r') {
      if (c === '\r' && text[i + 1] === '\n') i++;
      row.push(field); field = '';
      rows.push(row); row = [];
    } else field += c;
  }
  if (field.length || row.length) { row.push(field); rows.push(row); }
  return rows;
}

/**
 * Inspect column headings and map the most likely name / rank / country
 * columns rather than assuming fixed positions. Returns cleaned records:
 * [{ id, name, rank, country }]
 */
function loadUniversities(csvText) {
  const rows = parseCSV(csvText).filter(r => r.some(cell => cell.trim() !== ''));
  if (!rows.length) return [];

  // Find the most plausible header row within the first few rows.
  const score = (r) => r.reduce((s, cell) => {
    const c = cell.trim().toLowerCase();
    if (/(^|\b)(rank|position)\b/.test(c)) s += 2;
    if (/\b(name|institution|university)\b/.test(c)) s += 2;
    if (/\b(country|territory|location)\b/.test(c)) s += 1;
    return s;
  }, 0);
  let headerIdx = 0, best = -1;
  for (let i = 0; i < Math.min(rows.length, 5); i++) {
    const s = score(rows[i]);
    if (s > best) { best = s; headerIdx = i; }
  }
  const header = rows[headerIdx].map(h => h.trim().toLowerCase());

  const findCol = (tests) => {
    for (const test of tests) {
      const idx = header.findIndex(test);
      if (idx !== -1) return idx;
    }
    return -1;
  };
  const rankCol = findCol([
    h => h === 'rank' || h === '2027' || h === 'ranking',
    h => /\brank\b/.test(h) && !/\bprevious\b|\bprev\b|\bar\b|\ber\b|\bfsr\b|\bcpf\b|\bifr\b|\bisr\b|\birn\b|\beo\b|\bsus\b/.test(h),
  ]);
  const nameCol = findCol([
    h => h === 'name' || h === 'institution' || h === 'university',
    h => /institution|university|\bname\b/.test(h),
  ]);
  const countryCol = findCol([
    h => /country|territory/.test(h),
    h => /location/.test(h),
  ]);
  if (rankCol === -1 || nameCol === -1) return [];

  const seen = new Set();
  const out = [];
  for (let i = headerIdx + 1; i < rows.length; i++) {
    const r = rows[i];
    const name = (r[nameCol] || '').trim();
    const rankRaw = (r[rankCol] || '').trim().replace(/=+$/, '');
    // Only exact numerical ranks are eligible — banded ranks such as
    // "701-710" or "1401+" cannot support honest comparisons.
    if (!name || !/^\d+$/.test(rankRaw)) continue;
    const key = name.toLowerCase();
    if (seen.has(key)) continue; // remove exact duplicates
    seen.add(key);
    out.push({
      id: out.length,
      name,
      rank: parseInt(rankRaw, 10),
      country: countryCol !== -1 ? (r[countryCol] || '').trim() : '',
    });
  }
  return out;
}

/** 1 -> "1st", 2 -> "2nd", 21 -> "21st", 12 -> "12th" */
function ordinal(n) {
  const mod100 = n % 100;
  if (mod100 >= 11 && mod100 <= 13) return n + 'th';
  switch (n % 10) {
    case 1: return n + 'st';
    case 2: return n + 'nd';
    case 3: return n + 'rd';
    default: return n + 'th';
  }
}

/** Points earned by a correct answer given the streak AFTER this answer. */
function pointsForStreak(streak) {
  if (streak >= 10) return 5;
  if (streak >= 5) return 3;
  if (streak >= 3) return 2;
  return 1;
}

/**
 * Game state machine. Pure: UI drives it via guess()/next()/endRun().
 * mode: 'sudden' | 'normal'
 */
function createGame(universities, mode, rng) {
  const random = rng || Math.random;
  if (!universities || universities.length < 3) {
    throw new Error('Need at least three eligible universities to play.');
  }

  const state = {
    mode,
    score: 0,
    streak: 0,
    bestStreak: 0,
    correct: 0,
    incorrect: 0,
    current: null,   // known university (rank shown)
    challenger: null, // hidden university
    phase: 'guessing', // 'guessing' | 'revealed' | 'over'
    lastResult: null, // { wasCorrect, relation, points }
    usedIds: new Set(),
  };

  function pickRandom(pool) {
    return pool[Math.floor(random() * pool.length)];
  }

  /** Draw an unused university whose rank differs from `exclude`'s. */
  function draw(exclude) {
    let pool = universities.filter(u =>
      !state.usedIds.has(u.id) &&
      (!exclude || (u.id !== exclude.id && u.rank !== exclude.rank))
    );
    if (!pool.length) {
      // Pool exhausted: reset it (keeping the on-screen university out)
      // and allow universities to appear again.
      state.usedIds = new Set(exclude ? [exclude.id] : []);
      pool = universities.filter(u =>
        !exclude || (u.id !== exclude.id && u.rank !== exclude.rank)
      );
    }
    const chosen = pickRandom(pool);
    state.usedIds.add(chosen.id);
    return chosen;
  }

  state.current = draw(null);
  state.challenger = draw(state.current);

  return {
    get state() { return state; },

    /** guessHigher = true means "challenger is ranked higher (better)". */
    guess(guessHigher) {
      if (state.phase !== 'guessing') return null;
      const a = state.current, b = state.challenger;
      // Lower numerical position = higher-ranked university.
      const challengerIsHigher = b.rank < a.rank;
      const wasCorrect = guessHigher === challengerIsHigher;
      let points = 0;

      if (wasCorrect) {
        state.correct++;
        state.streak++;
        state.bestStreak = Math.max(state.bestStreak, state.streak);
        points = state.mode === 'normal' ? pointsForStreak(state.streak) : 1;
        state.score += points;
      } else {
        state.incorrect++;
        state.streak = 0;
        if (state.mode === 'normal') {
          points = -1;
          state.score = Math.max(0, state.score - 1);
        }
      }

      state.lastResult = { wasCorrect, challengerIsHigher, points };
      state.phase = (state.mode === 'sudden' && !wasCorrect) ? 'over' : 'revealed';
      return state.lastResult;
    },

    /** Challenger becomes the known university; a new challenger is drawn. */
    next() {
      if (state.phase !== 'revealed') return;
      state.current = state.challenger;
      state.challenger = draw(state.current);
      state.lastResult = null;
      state.phase = 'guessing';
    },

    endRun() { state.phase = 'over'; },
  };
}

</script>

<script>
/* ============================================================
   UI LAYER — rendering, input and persistence.
   All rules live in the logic module above; this file only
   draws state and forwards events.
   ============================================================ */
(function () {
  'use strict';

  const BEST_KEY = 'dono_hol_best_sudden';
  const app = document.getElementById('app');
  const announcer = document.getElementById('announcer');

  /* Branding hookup */
  const wm = document.getElementById('wordmark');
  wm.href = DONO_CONFIG.websiteUrl;
  if (DONO_CONFIG.logoUrl) {
    wm.innerHTML = '<img src="' + DONO_CONFIG.logoUrl + '" alt="' + DONO_CONFIG.brandName + '">';
  }
  document.getElementById('header-cta').href = DONO_CONFIG.websiteUrl;
  document.getElementById('footer-cta').href = DONO_CONFIG.websiteUrl;
  document.getElementById('footer-tagline').textContent = DONO_CONFIG.tagline;

  /* Data: parsed once at load, never reparsed between rounds */
  const csvNode = document.getElementById('dono-rankings');
  const universities = csvNode ? loadUniversities(csvNode.textContent.trim()) : [];

  let game = null;
  let busy = false; // guards against double-clicks while revealing

  function esc(s) {
    return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  }

  function readBest() {
    try { return parseInt(localStorage.getItem(BEST_KEY), 10) || 0; } catch (e) { return 0; }
  }
  function writeBest(v) {
    try { localStorage.setItem(BEST_KEY, String(v)); } catch (e) { /* private mode etc. */ }
  }

  function announce(text) { announcer.textContent = text; }

  /* ── Screens ─────────────────────────────────────────── */

  function renderError(msg) {
    app.innerHTML =
      '<div class="screen error-box"><h2>The game can\u2019t start</h2><p>' + esc(msg) +
      '</p></div>';
  }

  function renderLanding() {
    busy = false;
    const best = readBest();
    app.innerHTML =
      '<div class="screen landing">' +
        '<h1><span class="hi">Higher</span> or <span class="lo">Lower</span>?</h1>' +
        '<p class="lede">One university\u2019s world ranking is shown. Guess whether the next one sits higher or lower in the table \u2014 and keep your streak alive.</p>' +
        '<p class="dataset">' + esc(DONO_CONFIG.datasetLabel) + ' \u00b7 ' + universities.length + ' universities</p>' +
        '<div class="mode-buttons">' +
          '<button class="mode-btn sudden" id="mode-sudden">' +
            '<span class="mode-name">Sudden Death</span>' +
            '<span class="mode-desc">One point per correct answer. One mistake ends the run.</span>' +
          '</button>' +
          '<button class="mode-btn normal" id="mode-normal">' +
            '<span class="mode-name">Normal Mode</span>' +
            '<span class="mode-desc">Keep playing through mistakes. Streaks earn bonus points.</span>' +
          '</button>' +
        '</div>' +
        (best ? '<p class="best-line">Your best Sudden Death score on this device: <strong>' + best + '</strong></p>' : '') +
      '</div>';
    document.getElementById('mode-sudden').addEventListener('click', () => startGame('sudden'));
    document.getElementById('mode-normal').addEventListener('click', () => startGame('normal'));
    document.getElementById('mode-sudden').focus();
  }

  function startGame(mode) {
    try {
      game = createGame(universities, mode);
    } catch (e) {
      renderError(e.message);
      return;
    }
    renderRound();
    announce('New ' + (mode === 'sudden' ? 'Sudden Death' : 'Normal Mode') + ' game started.');
  }

  function statusBar() {
    const s = game.state;
    const modeLabel = s.mode === 'sudden' ? 'Sudden Death' : 'Normal Mode';
    const streakHot = s.streak >= 3 ? ' streak-hot' : '';
    return '<div class="status-bar">' +
      '<span class="mode-chip">' + modeLabel + '</span>' +
      '<div class="stats">' +
        '<span class="stat">Score<b>' + s.score + '</b></span>' +
        (s.mode === 'normal'
          ? '<span class="stat' + streakHot + '">Streak<b>' + (s.streak >= 3 ? '<span class="streak-flame" aria-hidden="true">\u2605 </span>' : '') + s.streak + '</b></span>'
          : '<span class="stat">Best streak<b>' + s.bestStreak + '</b></span>') +
      '</div>' +
      (s.mode === 'normal' ? '<button class="end-run-btn" id="end-run">End run</button>' : '<span></span>') +
    '</div>';
  }

  function card(u, opts) {
    const rankHTML = opts.showRank
      ? '<div class="uni-rank' + (opts.reveal ? ' revealing' : '') + '">' + ordinal(u.rank) +
        '<span class="of">in the world</span></div>'
      : '<div class="uni-rank hidden-rank" aria-label="ranking hidden">?<span class="of">higher or lower?</span></div>';
    return '<div class="uni-card">' +
      '<div class="uni-name">' + esc(u.name) + '</div>' +
      (u.country ? '<div class="uni-country">' + esc(u.country) + '</div>' : '') +
      rankHTML +
    '</div>';
  }

  function renderRound() {
    busy = false;
    const s = game.state;
    app.innerHTML =
      '<div class="screen">' + statusBar() +
        '<div class="duel">' +
          card(s.current, { showRank: true }) +
          '<div class="vs-spine"><span class="vs-badge" aria-hidden="true">vs</span></div>' +
          card(s.challenger, { showRank: false }) +
        '</div>' +
        '<div class="guess-row" role="group" aria-label="Your guess">' +
          '<button class="guess-btn" id="guess-higher">Higher<span class="key-hint">ranked above \u00b7 press H</span></button>' +
          '<button class="guess-btn lower" id="guess-lower">Lower<span class="key-hint">ranked below \u00b7 press L</span></button>' +
        '</div>' +
      '</div>';
    document.getElementById('guess-higher').addEventListener('click', () => onGuess(true));
    document.getElementById('guess-lower').addEventListener('click', () => onGuess(false));
    if (s.mode === 'normal') document.getElementById('end-run').addEventListener('click', onEndRun);
    announce('Is ' + s.challenger.name + ' ranked higher or lower than ' + s.current.name +
      ', which is ' + ordinal(s.current.rank) + ' in the world?');
  }

  function onGuess(guessHigher) {
    if (busy || !game || game.state.phase !== 'guessing') return;
    busy = true;
    const res = game.guess(guessHigher);
    const s = game.state;
    if (s.mode === 'sudden' && s.phase === 'over') {
      renderReveal(res, true);
      return;
    }
    renderReveal(res, false);
  }

  function relationText(res) {
    const s = game.state;
    const a = s.current, b = s.challenger;
    return b.name + ' is ranked ' + (res.challengerIsHigher ? 'higher' : 'lower') +
      ' than ' + a.name + ' (' + ordinal(b.rank) + ' vs ' + ordinal(a.rank) + ').';
  }

  function renderReveal(res, gameEnding) {
    const s = game.state;
    const pointsChip = s.mode === 'normal' || res.wasCorrect
      ? '<span class="points-chip ' + (res.points >= 0 ? 'gain' : 'loss') + '">' +
        (res.points >= 0 ? '+' + res.points : res.points) + '</span>'
      : '';
    app.innerHTML =
      '<div class="screen">' + statusBar() +
        '<div class="duel">' +
          card(s.current, { showRank: true }) +
          '<div class="vs-spine"><span class="vs-badge" aria-hidden="true">vs</span></div>' +
          card(s.challenger, { showRank: true, reveal: true }) +
        '</div>' +
        '<div class="result-panel ' + (res.wasCorrect ? 'correct' : 'wrong') + '">' +
          '<span class="result-text">' +
            '<span class="verdict">' + (res.wasCorrect ? '\u2713 Correct' : '\u2715 Incorrect') + '</span>' +
            '<span class="result-sub">' + esc(relationText(res)) + '</span>' +
          '</span>' +
          '<span class="result-actions">' + pointsChip +
            '<button class="next-btn" id="next-btn">' +
              (gameEnding ? 'See results' : 'Next round') + '<span class="sr-only"> (press Enter)</span></button>' +
          '</span>' +
        '</div>' +
      '</div>';
    document.getElementById('next-btn').addEventListener('click', gameEnding ? renderGameOver : onNext);
    document.getElementById('next-btn').focus();
    announce((res.wasCorrect ? 'Correct. ' : 'Incorrect. ') + relationText(res) +
      (res.points ? ' ' + (res.points > 0 ? 'Plus ' + res.points : 'Minus 1') + ' point' + (Math.abs(res.points) === 1 ? '' : 's') + '.' : '') +
      ' Score ' + s.score + '.');
  }

  function onNext() {
    if (!game || game.state.phase !== 'revealed') return;
    game.next();
    renderRound();
  }

  function onEndRun() {
    if (!game) return;
    game.endRun();
    renderGameOver();
  }

  function renderGameOver() {
    busy = false;
    const s = game.state;
    const sudden = s.mode === 'sudden';
    let recordLine = '';
    if (sudden) {
      const best = readBest();
      if (s.score > best) { writeBest(s.score); recordLine = '<div class="over-stat record"><b>' + s.score + '</b><span>new best on this device</span></div>'; }
      else recordLine = '<div class="over-stat"><b>' + Math.max(best, s.score) + '</b><span>best on this device</span></div>';
    }
    app.innerHTML =
      '<div class="screen over">' +
        '<p class="over-kicker">' + (sudden ? 'Sudden Death \u00b7 run over' : 'Normal Mode \u00b7 results') + '</p>' +
        '<h2>' + (sudden ? 'Good run.' : 'Final score.') + '</h2>' +
        '<div class="over-stats">' +
          '<div class="over-stat"><b>' + s.score + '</b><span>final score</span></div>' +
          '<div class="over-stat"><b>' + s.bestStreak + '</b><span>longest streak</span></div>' +
          (!sudden ? '<div class="over-stat"><b>' + s.correct + '</b><span>correct</span></div>' +
                     '<div class="over-stat"><b>' + s.incorrect + '</b><span>incorrect</span></div>' : recordLine) +
        '</div>' +
        '<div class="over-actions">' +
          '<button class="btn-primary" id="again-btn">Play again</button>' +
          '<button class="btn-secondary" id="mode-btn">Change mode</button>' +
        '</div>' +
        '<div class="cta-block">' +
          '<p>' + esc(DONO_CONFIG.endOfGameCta) + '</p>' +
          '<a class="btn-cta" href="' + esc(DONO_CONFIG.websiteUrl) + '" target="_blank" rel="noopener">' +
            esc(DONO_CONFIG.ctaButtonLabel) + '</a>' +
        '</div>' +
      '</div>';
    document.getElementById('again-btn').addEventListener('click', () => startGame(s.mode));
    document.getElementById('mode-btn').addEventListener('click', renderLanding);
    document.getElementById('again-btn').focus();
    announce('Game over. Final score ' + s.score + '. Longest streak ' + s.bestStreak + '.');
  }

  /* ── Keyboard play ───────────────────────────────────── */
  document.addEventListener('keydown', (e) => {
    if (!game) return;
    if (e.target && /^(input|textarea|select)$/i.test(e.target.tagName)) return;
    const k = e.key.toLowerCase();
    if (game.state.phase === 'guessing') {
      if (k === 'h' || k === 'arrowup') { e.preventDefault(); onGuess(true); }
      if (k === 'l' || k === 'arrowdown') { e.preventDefault(); onGuess(false); }
    } else if (game.state.phase === 'revealed' && (k === 'enter' || k === ' ')) {
      // Enter/Space already activate the focused Next button natively;
      // this catches the case where focus has moved elsewhere.
      if (document.activeElement !== document.getElementById('next-btn')) {
        e.preventDefault(); onNext();
      }
    }
  });

  /* ── Boot ────────────────────────────────────────────── */
  if (!universities || universities.length < 3) {
    renderError('The rankings data could not be loaded, or it contains fewer than three universities with valid names and numerical ranks. Please check the CSV block in this file.');
  } else {
    renderLanding();
  }
})();
</script>
</body>
</html>
