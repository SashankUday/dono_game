* { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {

  color: var(--dono-ink);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  line-height: 1.5;
}
button { font: inherit; cursor: pointer; }
a { color: var(--dono-brand); }

:focus-visible {
  outline: 3px solid var(--dono-brand);
  outline-offset: 3px;
  border-radius: 6px;
}

.sr-only {
  position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
  overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; border: 0;
}

/* ── Header ─────────────────────────────────────────────── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px clamp(16px, 4vw, 40px);
  border-bottom: 1px solid var(--dono-line);
  background: var(--dono-card);
}
.wordmark {
  font-family: var(--font-display);
  font-weight: 800; font-size: 26px; letter-spacing: -0.02em;
  color: var(--dono-brand); text-decoration: none;
  display: inline-flex; align-items: baseline; gap: 2px;
}
.wordmark .dot { color: var(--dono-accent); }
.wordmark img { height: 30px; display: block; }
.header-note {
  font-size: 13px; color: var(--dono-ink-soft);
}
.header-note a { text-decoration: none; font-weight: 600; }
.header-note a:hover { text-decoration: underline; }

/* ── Layout ─────────────────────────────────────────────── */
main {
  flex: 1; width: 100%; max-width: 900px; margin: 0 auto;
  padding: clamp(20px, 4vw, 44px) clamp(16px, 4vw, 40px) 32px;
  display: flex; flex-direction: column;
}
.screen { animation: screenIn 260ms ease both; }
@keyframes screenIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

/* ── Landing ────────────────────────────────────────────── */
.landing { text-align: center; margin: auto 0; padding: 24px 0 48px; }
.landing h1 {
  font-family: var(--font-display); font-weight: 800;
  font-size: clamp(38px, 7vw, 64px); line-height: 1.05; letter-spacing: -0.02em;
}
.landing h1 .hi { color: var(--dono-brand); }
.landing h1 .lo { color: var(--dono-ink-soft); }
.landing .lede {
  max-width: 46ch; margin: 18px auto 8px; color: var(--dono-ink-soft); font-size: 17px;
}
.landing .dataset { font-size: 13px; color: var(--dono-ink-soft); margin-bottom: 34px; }
.mode-buttons { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
.mode-btn {
  flex: 1 1 240px; max-width: 300px; text-align: left;
  background: var(--dono-card); border: 2px solid var(--dono-line);
  border-radius: var(--radius); padding: 20px 22px; box-shadow: var(--shadow);
  transition: transform 140ms ease, border-color 140ms ease;
}
.mode-btn:hover { transform: translateY(-3px); border-color: var(--dono-brand); }
.mode-btn .mode-name {
  font-family: var(--font-display); font-weight: 700; font-size: 21px; display: block;
}
.mode-btn .mode-desc { font-size: 14px; color: var(--dono-ink-soft); display: block; margin-top: 4px; }
.mode-btn.sudden .mode-name { color: var(--dono-wrong); }
.mode-btn.normal .mode-name { color: var(--dono-brand); }
.best-line { margin-top: 22px; font-size: 14px; color: var(--dono-ink-soft); }
.best-line strong { color: var(--dono-ink); }

.setup-screen { margin: 0; padding-bottom: 42px; }
.setup-section { margin-top: 26px; text-align: left; }
.setup-section h2 {
  font-family: var(--font-display); font-size: 20px; margin-bottom: 12px;
}
.setup-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
.setup-option {
  background: var(--dono-card); border: 2px solid var(--dono-line);
  border-radius: var(--radius); padding: 18px; text-align: left; min-height: 118px;
  box-shadow: var(--shadow); transition: transform 140ms ease, border-color 140ms ease;
}
.setup-option:hover { transform: translateY(-2px); border-color: var(--dono-brand); }
.setup-option.selected { border-color: var(--dono-brand); background: var(--dono-brand-soft); }
.option-heading {
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
  font-family: var(--font-display); font-weight: 700; font-size: 19px;
}
.option-badge {
  font-family: var(--font-body); font-size: 11px; font-weight: 700;
  text-transform: uppercase; color: var(--dono-ink); background: var(--dono-accent);
  border-radius: 999px; padding: 3px 7px; white-space: nowrap;
}
.start-panel {
  margin-top: 28px; padding: 18px; border-radius: var(--radius);
  background: var(--dono-card); border: 1px solid var(--dono-line);
  display: flex; align-items: center; justify-content: space-between; gap: 14px;
}
.setup-summary { font-family: var(--font-display); font-weight: 700; font-size: 20px; text-align: left; }
.setup-best { display: block; font-family: var(--font-body); font-size: 13px; color: var(--dono-ink-soft); margin-top: 3px; }
.start-btn { font-family: var(--font-display); font-size: 18px; padding-inline: 34px; }

/* ── Status bar ─────────────────────────────────────────── */
.status-bar {
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  flex-wrap: wrap; margin-bottom: 18px;
}
.mode-chip {
  font-size: 12px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
  background: var(--dono-brand-soft); color: var(--dono-brand-dark);
  padding: 5px 12px; border-radius: 999px;
}
.stats { display: flex; gap: 18px; align-items: baseline; }
.stat { font-size: 14px; color: var(--dono-ink-soft); }
.stat b { font-family: var(--font-display); font-size: 20px; color: var(--dono-ink); margin-left: 6px; }
.stat.streak-hot b { color: var(--dono-brand); }
.streak-flame { color: var(--dono-accent); }
.life-icons { display: inline-flex; gap: 4px; vertical-align: middle; }
.life-dot {
  width: 12px; height: 12px; border-radius: 999px; border: 2px solid var(--dono-wrong);
  display: inline-block; background: transparent;
}
.life-dot.full { background: var(--dono-wrong); }
.timer-stat b { color: var(--dono-brand); min-width: 42px; display: inline-block; }
.end-run-btn {
  background: none; border: 1px solid var(--dono-line); border-radius: 999px;
  padding: 6px 14px; font-size: 13px; color: var(--dono-ink-soft);
}
.end-run-btn:hover { border-color: var(--dono-ink-soft); color: var(--dono-ink); }

/* ── Duel cards ─────────────────────────────────────────── */
.duel { display: grid; grid-template-columns: 1fr auto 1fr; gap: 14px; align-items: stretch; }
.uni-card {
  background: var(--dono-card); border: 1px solid var(--dono-line);
  border-radius: var(--radius); box-shadow: var(--shadow);
  padding: clamp(18px, 3vw, 30px); text-align: center;
  display: flex; flex-direction: column; justify-content: center; min-height: 210px;
  color: inherit; width: 100%;
}
.uni-card:disabled { cursor: default; opacity: 1; }
.uni-card.tappable:hover { border-color: var(--dono-brand); transform: translateY(-2px); }
.uni-name {
  font-family: var(--font-display); font-weight: 700;
  font-size: clamp(19px, 2.6vw, 25px); line-height: 1.2; text-wrap: balance;
}
.uni-country { font-size: 13px; color: var(--dono-ink-soft); margin-top: 6px; }
.uni-rank {
  font-family: var(--font-display); font-weight: 800;
  font-size: clamp(40px, 6vw, 58px); letter-spacing: -0.02em;
  color: var(--dono-brand); margin-top: 12px; line-height: 1;
}
.uni-rank .of { display: block; font-size: 12px; font-weight: 500; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--dono-ink-soft); margin-top: 6px; }
.uni-rank.hidden-rank { color: var(--dono-ink-soft); }
.uni-rank.revealing { animation: rankPop 320ms cubic-bezier(.2,.9,.3,1.4) both; }
@keyframes rankPop { from { opacity: 0; transform: scale(.6); } to { opacity: 1; transform: scale(1); } }

.vs-spine { display: flex; align-items: center; justify-content: center; }
.vs-badge {
  font-family: var(--font-display); font-weight: 800; font-size: 15px;
  background: var(--dono-ink); color: var(--dono-paper);
  border-radius: 999px; width: 44px; height: 44px;
  display: grid; place-items: center;
}

/* ── Guess buttons ──────────────────────────────────────── */
.guess-row { display: flex; gap: 14px; margin-top: 18px; }
.guess-btn {
  flex: 1; padding: 18px 10px; border-radius: var(--radius); border: none;
  font-family: var(--font-display); font-weight: 700; font-size: 20px;
  background: var(--dono-brand); color: #fff;
  transition: background 140ms ease, transform 140ms ease;
}
.guess-btn:hover:enabled { background: var(--dono-brand-dark); transform: translateY(-2px); }
.guess-btn:disabled { opacity: 0.45; cursor: not-allowed; }
.guess-btn .key-hint { display: block; font-family: var(--font-body); font-weight: 500; font-size: 12px; opacity: .8; margin-top: 3px; }
.guess-btn.lower { background: var(--dono-ink); }
.guess-btn.lower:hover:enabled { background: #000; }

/* ── Result panel ───────────────────────────────────────── */
.result-panel {
  margin-top: 18px; border-radius: var(--radius); padding: 16px 20px;
  display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap;
  border: 1.5px solid;
}
.result-panel.correct { background: var(--dono-correct-soft); border-color: var(--dono-correct); }
.result-panel.wrong { background: var(--dono-wrong-soft); border-color: var(--dono-wrong); }
.result-text { font-weight: 600; }
.result-text .verdict { font-family: var(--font-display); font-weight: 800; margin-right: 8px; }
.result-panel.correct .verdict { color: var(--dono-correct); }
.result-panel.wrong .verdict { color: var(--dono-wrong); }
.result-sub { display: block; font-weight: 400; font-size: 14px; color: var(--dono-ink-soft); margin-top: 2px; }
.result-actions { display: flex; align-items: center; gap: 12px; }
.points-chip {
  font-family: var(--font-display); font-weight: 800; font-size: 17px;
  padding: 6px 12px; border-radius: 999px; background: var(--dono-card);
}
.points-chip.gain { color: var(--dono-correct); }
.points-chip.loss { color: var(--dono-wrong); }
.auto-next { font-size: 13px; color: var(--dono-ink-soft); }
.next-btn {
  border: none; border-radius: 999px; padding: 12px 26px;
  background: var(--dono-ink); color: #fff; font-weight: 600; font-size: 15px;
}
.next-btn:hover { background: #000; }

/* ── Persistent in-game CTA / footer ────────────────────── */
.dono-footer {
  margin-top: auto; padding: 18px clamp(16px, 4vw, 40px);
  text-align: center; font-size: 13px; color: var(--dono-ink-soft);
  border-top: 1px solid var(--dono-line);
}
.dono-footer a { font-weight: 600; text-decoration: none; }
.dono-footer a:hover { text-decoration: underline; }

/* ── Game over ──────────────────────────────────────────── */
.over { text-align: center; margin: auto 0; padding: 20px 0 40px; }
.over .over-kicker {
  font-size: 13px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--dono-ink-soft);
}
.over h2 {
  font-family: var(--font-display); font-weight: 800;
  font-size: clamp(30px, 5vw, 44px); margin: 8px 0 26px; letter-spacing: -0.02em;
}
.over-stats {
  display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 30px;
}
.over-stat {
  background: var(--dono-card); border: 1px solid var(--dono-line);
  border-radius: var(--radius); padding: 16px 22px; min-width: 128px; box-shadow: var(--shadow);
}
.over-stat b { display: block; font-family: var(--font-display); font-size: 34px; font-weight: 800; color: var(--dono-brand); }
.over-stat span { font-size: 13px; color: var(--dono-ink-soft); }
.over-stat.record { background: var(--dono-accent); border-color: var(--dono-accent); }
.over-stat.record b, .over-stat.record span { color: var(--dono-ink); }
.ended-line { color: var(--dono-ink-soft); margin: -12px auto 24px; max-width: 56ch; font-size: 14px; }
.over-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 34px; }
.btn-primary, .btn-secondary, .btn-cta {
  border-radius: 999px; padding: 13px 26px; font-weight: 600; font-size: 15px; border: none;
  text-decoration: none; display: inline-block;
}
.btn-primary { background: var(--dono-brand); color: #fff; }
.btn-primary:hover { background: var(--dono-brand-dark); }
.btn-secondary { background: var(--dono-card); color: var(--dono-ink); border: 1.5px solid var(--dono-line); }
.btn-secondary:hover { border-color: var(--dono-ink-soft); }
.cta-block {
  background: var(--dono-brand-soft); border-radius: var(--radius);
  padding: 24px; max-width: 560px; margin: 0 auto;
}
.cta-block p { font-size: 15px; margin-bottom: 14px; color: var(--dono-brand-dark); font-weight: 500; }
.btn-cta { background: var(--dono-brand); color: #fff; font-family: var(--font-display); font-weight: 700; }
.btn-cta:hover { background: var(--dono-brand-dark); }

/* ── Error state ────────────────────────────────────────── */
.error-box {
  margin: auto; max-width: 480px; text-align: center;
  background: var(--dono-wrong-soft); border: 1.5px solid var(--dono-wrong);
  border-radius: var(--radius); padding: 28px;
}
.error-box h2 { font-family: var(--font-display); margin-bottom: 8px; }
.error-box p { color: var(--dono-ink-soft); font-size: 15px; }

/* ── Responsive ─────────────────────────────────────────── */
@media (max-width: 640px) {
  .duel { grid-template-columns: 1fr; }
  .vs-spine { padding: 0; }
  .uni-card { min-height: 150px; }
  .stats { gap: 12px; }
  .header-note { display: none; }
  .setup-grid { grid-template-columns: 1fr; }
  .setup-option { min-height: 0; }
  .start-panel { flex-direction: column; align-items: stretch; }
  .setup-summary { text-align: center; }
  .guess-row { position: sticky; bottom: 10px; z-index: 2; }
}

/* ── Reduced motion ─────────────────────────────────────── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation: none !important; transition: none !important; }
}

<script src="game-core.js"></script>

<script>

/* ============================================================
   UI LAYER — rendering, input, timer management and persistence.
   Core rules live in game-core.js so they can be tested in Node.
   ============================================================ */
(function () {
  'use strict';

  const core = window.DonoHOL;
  const app = document.getElementById('app');
  const announcer = document.getElementById('announcer');
  const storagePrefix = 'dono_hol_';
  const revealDelayMs = 650;

  const DEFAULT_SETTINGS = {
    format: core.FORMAT.LIVES,
    pool: core.POOL.GLOBAL,
    difficulty: core.DIFFICULTY.NORMAL,
  };

  const FORMAT_COPY = {
    sudden: {
      title: 'Sudden Death',
      desc: 'One mistake ends the run. How long can you keep your streak alive?',
    },
    lives: {
      title: 'Three Lives',
      desc: 'Build the highest score you can. Three wrong answers end the run.',
      badge: 'Recommended',
    },
    timed: {
      title: '60 Seconds',
      desc: 'Race against the clock and score as many points as possible in 60 seconds.',
    },
  };

  const POOL_COPY = {
    global: 'Every eligible university',
    top200: 'Exact ranks 1 to 200',
    top50: 'Exact ranks 1 to 50',
    uk: 'United Kingdom institutions',
    us: 'United States institutions',
  };

  const DIFFICULTY_COPY = {
    easy: 'Rank gap 151 to 400',
    normal: 'Rank gap 50 to 150',
    hard: 'Rank gap 1 to 49',
  };

  const wm = document.getElementById('wordmark');
  wm.href = DONO_CONFIG.websiteUrl;
  if (DONO_CONFIG.logoUrl) {
    wm.innerHTML = '<img src="' + DONO_CONFIG.logoUrl + '" alt="' + DONO_CONFIG.brandName + '">';
  }
  document.getElementById('header-cta').href = DONO_CONFIG.websiteUrl;
  document.getElementById('footer-cta').href = DONO_CONFIG.websiteUrl;
  document.getElementById('footer-tagline').textContent = DONO_CONFIG.tagline;

  const csvNode = document.getElementById('dono-rankings');
  const dataset = csvNode ? core.loadUniversities(csvNode.textContent) : { universities: [], excludedBanded: 0, error: 'The rankings CSV is missing.' };
  const universities = dataset.universities;
  let settings = loadSettings();
  let game = null;
  let busy = false;
  let timerId = null;
  let timedAutoNextId = null;
  let lastTimeWarning = null;

  function esc(value) {
    return String(value).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  }

  function safeRead(key, fallback) {
    try {
      const value = localStorage.getItem(key);
      return value === null ? fallback : value;
    } catch (e) {
      return fallback;
    }
  }

  function safeWrite(key, value) {
    try { localStorage.setItem(key, String(value)); } catch (e) { /* storage may be unavailable */ }
  }

  function loadSettings() {
    return {
      format: safeRead(storagePrefix + 'last_format', DEFAULT_SETTINGS.format),
      pool: safeRead(storagePrefix + 'last_pool', DEFAULT_SETTINGS.pool),
      difficulty: safeRead(storagePrefix + 'last_difficulty', DEFAULT_SETTINGS.difficulty),
    };
  }

  function saveSettings() {
    safeWrite(storagePrefix + 'last_format', settings.format);
    safeWrite(storagePrefix + 'last_pool', settings.pool);
    safeWrite(storagePrefix + 'last_difficulty', settings.difficulty);
  }

  function bestKey(config) {
    return storagePrefix + 'best_' + config.format + '_' + config.pool + (config.pool === core.POOL.GLOBAL ? '_' + config.difficulty : '');
  }

  function readBest(config) {
    return parseInt(safeRead(bestKey(config), '0'), 10) || 0;
  }

  function writeBest(config, score) {
    if (score > readBest(config)) safeWrite(bestKey(config), score);
  }

  function announce(text) {
    announcer.textContent = text;
  }

  function clearTimers() {
    if (timerId) window.clearInterval(timerId);
    if (timedAutoNextId) window.clearTimeout(timedAutoNextId);
    timerId = null;
    timedAutoNextId = null;
  }

  function configSummary(config) {
    return [
      core.FORMAT_LABELS[config.format],
      core.POOL_LABELS[config.pool],
      config.pool === core.POOL.GLOBAL ? core.DIFFICULTY_RULES[config.difficulty].label : null,
    ].filter(Boolean).join(' · ');
  }

  function poolCount(pool) {
    return core.buildPool(universities, pool).length;
  }

  function currentBestLabel(config) {
    const best = readBest(config);
    return best ? '<span class="setup-best">Best: <b>' + best + '</b></span>' : '';
  }

  function renderError(message) {
    clearTimers();
    app.innerHTML = '<div class="screen error-box"><h2>The game can\u2019t start</h2><p>' + esc(message) + '</p></div>';
  }

  function optionButton(group, value, title, description, active, badge) {
    return '<button class="setup-option' + (active ? ' selected' : '') + '" data-group="' + group + '" data-value="' + value + '" aria-pressed="' + active + '">' +
      '<span class="option-heading"><span>' + esc(title) + '</span>' + (badge ? '<span class="option-badge">' + esc(badge) + '</span>' : '') + '</span>' +
      '<span class="mode-desc">' + esc(description) + '</span>' +
    '</button>';
  }

  function renderLanding() {
    clearTimers();
    busy = false;
    game = null;
    saveSettings();
    const showDifficulty = settings.pool === core.POOL.GLOBAL;
    const effectiveConfig = Object.assign({}, settings);
    app.innerHTML =
      '<div class="screen landing setup-screen">' +
        '<h1><span class="hi">Higher</span> or <span class="lo">Lower</span>?</h1>' +
        '<p class="lede">Guess which university is closer to #1 in the world rankings.</p>' +
        '<p class="dataset">' + esc(DONO_CONFIG.datasetLabel) + ' · ' + universities.length + ' exact-ranked universities' +
          (dataset.excludedBanded ? ' · ' + dataset.excludedBanded + ' banded entries excluded' : '') + '</p>' +
        '<section class="setup-section" aria-labelledby="format-heading"><h2 id="format-heading">How do you want to play?</h2><div class="setup-grid">' +
          optionButton('format', 'sudden', FORMAT_COPY.sudden.title, FORMAT_COPY.sudden.desc, settings.format === 'sudden') +
          optionButton('format', 'lives', FORMAT_COPY.lives.title, FORMAT_COPY.lives.desc, settings.format === 'lives', FORMAT_COPY.lives.badge) +
          optionButton('format', 'timed', FORMAT_COPY.timed.title, FORMAT_COPY.timed.desc, settings.format === 'timed') +
        '</div></section>' +
        '<section class="setup-section" aria-labelledby="pool-heading"><h2 id="pool-heading">Which universities?</h2><div class="setup-grid">' +
          ['global','top200','top50','uk','us'].map(pool => optionButton('pool', pool, core.POOL_LABELS[pool], POOL_COPY[pool] + ' · ' + poolCount(pool) + ' universities', settings.pool === pool)).join('') +
        '</div></section>' +
        (showDifficulty ? '<section class="setup-section" aria-labelledby="difficulty-heading"><h2 id="difficulty-heading">How difficult?</h2><div class="setup-grid compact">' +
          ['easy','normal','hard'].map(diff => optionButton('difficulty', diff, core.DIFFICULTY_RULES[diff].label, DIFFICULTY_COPY[diff], settings.difficulty === diff)).join('') +
        '</div></section>' : '') +
        '<div class="start-panel"><p class="setup-summary">' + esc(configSummary(effectiveConfig)) + currentBestLabel(effectiveConfig) + '</p>' +
          '<button class="btn-primary start-btn" id="start-game">Start Game</button></div>' +
      '</div>';

    app.querySelectorAll('.setup-option').forEach(button => {
      button.addEventListener('click', () => {
        settings[button.dataset.group] = button.dataset.value;
        renderLanding();
      });
    });
    document.getElementById('start-game').addEventListener('click', startGame);
    document.getElementById('start-game').focus();
  }

  function startGame() {
    clearTimers();
    saveSettings();
    try {
      game = core.createGame(universities, settings);
    } catch (error) {
      renderError(error.message);
      return;
    }
    lastTimeWarning = null;
    renderRound();
    announce('New ' + configSummary(settings) + ' game started.');
  }

  function statusBar() {
    const s = game.state;
    const config = s.config;
    const label = configSummary(config);
    const streak = '<span class="stat">Streak<b>' + s.streak + '</b></span>';
    let stats = '';
    if (config.format === core.FORMAT.SUDDEN) {
      stats = '<span class="stat">Score<b>' + s.score + '</b></span>' + streak + '<span class="stat">Best<b>' + readBest(config) + '</b></span>';
    } else if (config.format === core.FORMAT.LIVES) {
      stats = '<span class="stat">Score<b>' + s.score + '</b></span>' + livesMarkup(s.lives) + streak + '<span class="stat">Next<b>+' + core.pointsForLivesStreak(s.streak + 1) + '</b></span>';
    } else {
      stats = '<span class="stat">Score<b>' + s.score + '</b></span><span class="stat timer-stat">Time<b>' + s.timeRemaining + 's</b></span><span class="stat">Correct<b>' + s.correct + '</b></span>' + streak;
    }
    return '<div class="status-bar"><span class="mode-chip">' + esc(label) + '</span><div class="stats">' + stats + '</div></div>';
  }

  function livesMarkup(lives) {
    let icons = '';
    for (let i = 1; i <= 3; i++) icons += '<span class="life-dot' + (i <= lives ? ' full' : '') + '" aria-hidden="true"></span>';
    return '<span class="stat lives-stat"><span class="sr-only">Lives remaining </span><span class="life-icons" aria-hidden="true">' + icons + '</span><b>' + lives + '</b></span>';
  }

  function card(university, opts) {
    const rankHTML = opts.showRank
      ? '<div class="uni-rank' + (opts.reveal ? ' revealing' : '') + '">' + core.ordinal(university.rank) + '<span class="of">in the world</span></div>'
      : '<div class="uni-rank hidden-rank" aria-label="ranking hidden">?<span class="of">higher or lower?</span></div>';
    return '<button class="uni-card' + (opts.tappable ? ' tappable' : '') + '" ' + (opts.guess !== undefined ? 'data-guess="' + opts.guess + '"' : 'tabindex="-1" disabled') + '>' +
      '<span class="uni-name">' + esc(university.name) + '</span>' +
      (university.country ? '<span class="uni-country">' + esc(university.country) + '</span>' : '') + rankHTML +
    '</button>';
  }

  function renderRound() {
    busy = false;
    const s = game.state;
    app.innerHTML =
      '<div class="screen game-screen">' + statusBar() +
        '<div class="duel">' +
          card(s.current, { showRank: true }) +
          '<div class="vs-spine"><span class="vs-badge" aria-hidden="true">vs</span></div>' +
          card(s.challenger, { showRank: false, tappable: true, guess: 'higher' }) +
        '</div>' +
        '<div class="guess-row" role="group" aria-label="Your guess">' +
          '<button class="guess-btn" id="guess-higher">Higher ranked<span class="key-hint">Closer to #1 · press H</span></button>' +
          '<button class="guess-btn lower" id="guess-lower">Lower ranked<span class="key-hint">Further from #1 · press L</span></button>' +
        '</div>' +
      '</div>';
    document.getElementById('guess-higher').addEventListener('click', () => onGuess(true));
    document.getElementById('guess-lower').addEventListener('click', () => onGuess(false));
    app.querySelector('.uni-card.tappable').addEventListener('click', () => onGuess(true));
    announce('New comparison. Is ' + s.challenger.name + ' ranked higher or lower than ' + s.current.name + ', which is ' + core.ordinal(s.current.rank) + ' in the world?');
  }

  function relationText(result) {
    return result.challenger.name + ' is ranked ' + (result.challengerIsHigher ? 'higher' : 'lower') + ' than ' + result.current.name + ' (' + core.ordinal(result.challenger.rank) + ' vs ' + core.ordinal(result.current.rank) + ').';
  }

  function pointsText(result) {
    if (result.points > 0) return '+' + result.points;
    if (result.points < 0) return String(result.points);
    return '0';
  }

  function onGuess(guessHigher) {
    if (busy || !game || game.state.phase !== 'guessing') return;
    if (game.state.config.format === core.FORMAT.TIMED && game.state.timeRemaining <= 0) return;
    busy = true;
    const wasFirstTimedAnswer = game.state.config.format === core.FORMAT.TIMED && !game.state.timerStarted;
    const result = game.guess(guessHigher);
    if (!result) return;
    if (wasFirstTimedAnswer) startTimer();
    renderReveal(result);
  }

  function renderReveal(result) {
    const s = game.state;
    const ending = s.phase === 'over';
    const timed = s.config.format === core.FORMAT.TIMED;
    const nextLabel = ending ? 'See results' : 'Next round';
    app.innerHTML =
      '<div class="screen game-screen">' + statusBar() +
        '<div class="duel">' +
          card(result.current, { showRank: true }) +
          '<div class="vs-spine"><span class="vs-badge" aria-hidden="true">vs</span></div>' +
          card(result.challenger, { showRank: true, reveal: true }) +
        '</div>' +
        '<div class="result-panel ' + (result.wasCorrect ? 'correct' : 'wrong') + '">' +
          '<span class="result-text"><span class="verdict"><span aria-hidden="true">' + (result.wasCorrect ? '✓' : '✕') + '</span> ' + (result.wasCorrect ? 'Correct' : 'Incorrect') + '</span>' +
            '<span class="result-sub">' + esc(relationText(result)) + (result.lifeLost ? ' One life lost.' : '') + '</span></span>' +
          '<span class="result-actions"><span class="points-chip ' + (result.points >= 0 ? 'gain' : 'loss') + '">' + pointsText(result) + '</span>' +
            (timed && !ending ? '<span class="auto-next">Next...</span>' : '<button class="next-btn" id="next-btn">' + nextLabel + '<span class="sr-only"> (press Enter)</span></button>') +
          '</span>' +
        '</div>' +
      '</div>';
    announce((result.wasCorrect ? 'Correct. ' : 'Incorrect. ') + relationText(result) + ' Points ' + pointsText(result) + '. ' + (result.lifeLost ? s.lives + ' lives remaining. ' : '') + 'Score ' + s.score + '.');

    if (timed && !ending) {
      timedAutoNextId = window.setTimeout(() => {
        if (!game || game.state.phase !== 'revealed') return;
        game.next();
        if (game.state.timeRemaining <= 0) renderGameOver();
        else renderRound();
      }, revealDelayMs);
    } else {
      document.getElementById('next-btn').addEventListener('click', ending ? renderGameOver : onNext);
      document.getElementById('next-btn').focus();
    }
  }

  function onNext() {
    if (!game || game.state.phase !== 'revealed') return;
    game.next();
    renderRound();
  }

  function startTimer() {
    if (timerId) return;
    timerId = window.setInterval(() => {
      if (!game || game.state.config.format !== core.FORMAT.TIMED) return;
      const remaining = game.tick(1);
      if ([30, 10, 5].includes(remaining) && lastTimeWarning !== remaining) {
        lastTimeWarning = remaining;
        announce(remaining + ' seconds remaining.');
      }
      if (remaining <= 0) {
        clearTimers();
        announce('Time is up. Game over.');
        renderGameOver();
      } else {
        const timer = app.querySelector('.timer-stat b');
        if (timer) timer.textContent = remaining + 's';
      }
    }, 1000);
  }

  function resultStats() {
    const s = game.state;
    const accuracyText = core.accuracy(s.correct, s.attempts) + '%';
    const stats = [
      ['Final score', s.score],
      ['Longest streak', s.bestStreak],
    ];
    if (s.config.format !== core.FORMAT.SUDDEN) {
      stats.push(['Correct', s.correct], ['Incorrect', s.incorrect], ['Accuracy', accuracyText]);
    }
    if (s.config.format === core.FORMAT.TIMED) stats.push(['Attempts', s.attempts]);
    stats.push(['Best score', Math.max(readBest(s.config), s.score)]);
    return stats.map(([label, value]) => '<div class="over-stat"><b>' + value + '</b><span>' + esc(label) + '</span></div>').join('');
  }

  function renderGameOver() {
    if (!game) return;
    clearTimers();
    busy = false;
    const s = game.state;
    writeBest(s.config, s.score);
    const ended = s.endedByComparison ? '<p class="ended-line">Ended on: ' + esc(relationText(s.endedByComparison)) + '</p>' : '';
    app.innerHTML =
      '<div class="screen over">' +
        '<p class="over-kicker">' + esc(configSummary(s.config)) + ' · results</p>' +
        '<h2>' + (s.config.format === core.FORMAT.TIMED ? 'Time up.' : 'Final score.') + '</h2>' +
        '<div class="over-stats">' + resultStats() + '</div>' + ended +
        '<div class="over-actions">' +
          '<button class="btn-primary" id="again-btn">Play again</button>' +
          '<button class="btn-secondary" id="settings-btn">Change game settings</button>' +
          '<a class="btn-cta" href="' + esc(DONO_CONFIG.websiteUrl) + '" target="_blank" rel="noopener">Discover Dono</a>' +
        '</div>' +
        '<div class="cta-block"><p>Know your university rankings? See how Dono helps university communities fund the things that matter.</p></div>' +
      '</div>';
    document.getElementById('again-btn').addEventListener('click', startGame);
    document.getElementById('settings-btn').addEventListener('click', renderLanding);
    document.getElementById('again-btn').focus();
    announce('Game over. Final score ' + s.score + '. Longest streak ' + s.bestStreak + '.');
  }

  document.addEventListener('keydown', (event) => {
    if (!game || (event.target && /^(input|textarea|select)$/i.test(event.target.tagName))) return;
    const key = event.key.toLowerCase();
    if (game.state.phase === 'guessing') {
      if (key === 'h' || key === 'arrowup') { event.preventDefault(); onGuess(true); }
      if (key === 'l' || key === 'arrowdown') { event.preventDefault(); onGuess(false); }
    } else if (game.state.phase === 'revealed' && game.state.config.format !== core.FORMAT.TIMED && (key === 'enter' || key === ' ')) {
      if (document.activeElement !== document.getElementById('next-btn')) {
        event.preventDefault();
        onNext();
      }
    }
  });

  if (dataset.error || universities.length < 3) {
    renderError(dataset.error || 'The rankings data contains fewer than three universities with exact numerical ranks.');
  } else {
    renderLanding();
  }
})();

</script>
</body>
</html>
