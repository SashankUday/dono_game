<html lang="en-GB">
<head>
<meta charset="UTF-8">

<title>Dono Games — University Rankings</title>
<meta name="description" content="Guess which university is ranked higher. A game by Dono.">

<!-- ══════════════════════════════════════════════════════════════
     DONO BRAND SETTINGS — everything you are likely to edit lives
     in this block and the :root CSS variables just below it.
     ══════════════════════════════════════════════════════════════ -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
/* ═══════════ DONO PALETTE & TYPE — edit these variables ═══════════ */
:root {
  --dono-brand:        #4D3DF7;  /* primary brand colour            */
  --dono-brand-dark:   #372BB8;  /* hover / pressed                 */
  --dono-brand-soft:   #EAE7FE;  /* tinted backgrounds              */
  --dono-accent:       #FFC53D;  /* streaks & highlights            */
  --dono-ink:          #17162B;  /* main text                       */
  --dono-ink-soft:     #5B5A72;  /* secondary text                  */
  --dono-paper:        #F7F6FD;  /* page background                 */
  --dono-card:         #FFFFFF;  /* card background                 */
  --dono-correct:      #0E8F5B;  /* success                         */
  --dono-correct-soft: #E2F5EC;
  --dono-wrong:        #D64550;  /* error                           */
  --dono-wrong-soft:   #FCE9EB;
  --dono-line:         #E4E2F2;  /* hairlines                       */

  --font-display: "Bricolage Grotesque", "Inter", system-ui, sans-serif;
  --font-body:    "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;

  --radius: 18px;
  --shadow: 0 10px 30px rgba(23, 22, 43, 0.08);
}
/* ══════════════════ end of editable brand block ═══════════════════ */

* { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--font-body);
  background: var(--dono-paper);
  color: var(--dono-ink);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  line-height: 1.5;
}
button { font: inherit; cursor: pointer; }
a { color: var(--dono-brand); }

:focus-visible {
  outline: 3px solid var(--dono-brand);
  outline-offset: 3px;
  border-radius: 6px;
}

.sr-only {
  position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
  overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; border: 0;
}

/* ── Header ─────────────────────────────────────────────── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px clamp(16px, 4vw, 40px);
  border-bottom: 1px solid var(--dono-line);
  background: var(--dono-card);
}
.wordmark {
  font-family: var(--font-display);
  font-weight: 800; font-size: 26px; letter-spacing: -0.02em;
  color: var(--dono-brand); text-decoration: none;
  display: inline-flex; align-items: baseline; gap: 2px;
}
.wordmark .dot { color: var(--dono-accent); }
.wordmark .games { color: var(--dono-accent); }
.wordmark img { height: 30px; display: block; }
.how-to-play-btn {
  border: 1.5px solid var(--dono-line); border-radius: 999px; padding: 8px 14px;
  background: var(--dono-card); color: var(--dono-ink); font-weight: 700; font-size: 14px;
}
.how-to-play-btn:hover { border-color: var(--dono-brand); color: var(--dono-brand); }
.header-note {
  font-size: 13px; color: var(--dono-ink-soft);
}
.header-note a { text-decoration: none; font-weight: 600; }
.header-note a:hover { text-decoration: underline; }

/* ── Layout ─────────────────────────────────────────────── */
main {
  flex: 1; width: 100%; max-width: 900px; margin: 0 auto;
  padding: clamp(20px, 4vw, 44px) clamp(16px, 4vw, 40px) 32px;
  display: flex; flex-direction: column;
}
.screen { animation: screenIn 260ms ease both; }
@keyframes screenIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

/* ── Landing ────────────────────────────────────────────── */
.landing { text-align: center; margin: auto 0; padding: 24px 0 48px; }
.landing h1 {
  font-family: var(--font-display); font-weight: 800;
  font-size: clamp(38px, 7vw, 64px); line-height: 1.05; letter-spacing: -0.02em;
}
.landing h1 .hi { color: var(--dono-brand); }
.landing h1 .lo { color: var(--dono-ink-soft); }
.landing .lede {
  max-width: 46ch; margin: 18px auto 8px; color: var(--dono-ink-soft); font-size: 17px;
}
.landing .dataset { font-size: 13px; color: var(--dono-ink-soft); margin-bottom: 34px; }
.mode-buttons { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
.mode-btn {
  flex: 1 1 240px; max-width: 300px; text-align: left;
  background: var(--dono-card); border: 2px solid var(--dono-line);
  border-radius: var(--radius); padding: 20px 22px; box-shadow: var(--shadow);
  transition: transform 140ms ease, border-color 140ms ease;
}
.mode-btn:hover { transform: translateY(-3px); border-color: var(--dono-brand); }
.mode-btn .mode-name {
  font-family: var(--font-display); font-weight: 700; font-size: 21px; display: block;
}
.mode-btn .mode-desc { font-size: 14px; color: var(--dono-ink-soft); display: block; margin-top: 4px; }
.mode-btn.sudden .mode-name { color: var(--dono-wrong); }
.mode-btn.normal .mode-name { color: var(--dono-brand); }
.best-line { margin-top: 22px; font-size: 14px; color: var(--dono-ink-soft); }
.best-line strong { color: var(--dono-ink); }

.setup-screen { margin: 0; padding-bottom: 42px; }
.setup-section { margin-top: 26px; text-align: left; }
.setup-section h2 {
  font-family: var(--font-display); font-size: 20px; margin-bottom: 12px;
}
.setup-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
.setup-option {
  background: var(--dono-card); border: 2px solid var(--dono-line);
  border-radius: var(--radius); padding: 18px; text-align: center; min-height: 118px;
  box-shadow: var(--shadow); transition: transform 140ms ease, border-color 140ms ease;
}
.setup-option:hover { transform: translateY(-2px); border-color: var(--dono-brand); }
.setup-option.selected { border-color: var(--dono-brand); background: var(--dono-brand-soft); }
.option-heading {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  font-family: var(--font-display); font-weight: 700; font-size: 19px;
}
.option-badge {
  font-family: var(--font-body); font-size: 11px; font-weight: 700;
  text-transform: uppercase; color: var(--dono-ink); background: var(--dono-accent);
  border-radius: 999px; padding: 3px 7px; white-space: nowrap;
}
.start-panel {
  margin-top: 28px; padding: 18px; border-radius: var(--radius);
  background: var(--dono-card); border: 1px solid var(--dono-line);
  display: flex; align-items: center; justify-content: space-between; gap: 14px;
}
.setup-actions { display: flex; align-items: center; justify-content: flex-end; gap: 10px; flex-wrap: wrap; }
.setup-summary { font-family: var(--font-display); font-weight: 700; font-size: 20px; text-align: left; }
.setup-best { display: block; font-family: var(--font-body); font-size: 13px; color: var(--dono-ink-soft); margin-top: 3px; }
.start-btn { font-family: var(--font-display); font-size: 18px; padding-inline: 34px; }
.daily-note {
  background: var(--dono-card); border: 1px solid var(--dono-line);
  border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow);
}
.daily-note p { color: var(--dono-ink-soft); font-size: 15px; }
.daily-note .daily-status { margin-top: 8px; color: var(--dono-brand-dark); font-weight: 600; }
.setup-option .mode-desc { font-size: 12px; line-height: 1.35; }

/* ── How to play ───────────────────────────────────────── */
.how-to-play-dialog { border: 0; padding: 0; background: transparent; max-width: min(620px, calc(100% - 32px)); }
.how-to-play-dialog::backdrop { background: rgba(23, 22, 43, .48); }
.how-to-play-panel { background: var(--dono-card); border-radius: var(--radius); padding: clamp(24px, 5vw, 38px); box-shadow: var(--shadow); position: relative; }
.how-to-play-panel h2 { font-family: var(--font-display); font-size: 30px; margin-bottom: 8px; }
.how-to-play-panel > p { color: var(--dono-ink-soft); }
.how-steps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 24px 0; }
.how-step { background: var(--dono-brand-soft); border-radius: 14px; padding: 14px; text-align: center; }
.how-visual { display: block; font-size: 32px; margin-bottom: 6px; }
.how-step b { display: block; font-family: var(--font-display); }
.how-step span { display: block; font-size: 12px; color: var(--dono-ink-soft); margin-top: 4px; }
.dialog-close { position: absolute; top: 12px; right: 12px; border: 0; background: transparent; font-size: 26px; color: var(--dono-ink-soft); width: 40px; height: 40px; }
.dialog-close:hover { color: var(--dono-ink); }

/* ── Status bar ─────────────────────────────────────────── */
.status-bar {
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  flex-wrap: wrap; margin-bottom: 18px;
}
.mode-chip {
  font-size: 12px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
  background: var(--dono-brand-soft); color: var(--dono-brand-dark);
  padding: 5px 12px; border-radius: 999px;
}
.stats { display: flex; gap: 18px; align-items: baseline; }
.stat { font-size: 14px; color: var(--dono-ink-soft); }
.stat b { font-family: var(--font-display); font-size: 20px; color: var(--dono-ink); margin-left: 6px; }
.stat.streak-hot b { color: var(--dono-brand); }
.streak-stat b { display: inline-flex; align-items: center; gap: 5px; }
.streak-flame {
  color: var(--dono-accent); display: inline-block; font-size: 19px;
  filter: drop-shadow(0 2px 4px rgba(255, 197, 61, .45));
}
.streak-hot .streak-flame { animation: flamePulse 700ms ease-in-out infinite alternate; }
.multiplier-pill {
  display: inline-flex; align-items: center; gap: 5px; background: var(--dono-accent);
  color: var(--dono-ink); border-radius: 999px; padding: 4px 9px;
  font-family: var(--font-display); font-weight: 800; font-size: 14px;
}
.streak-add {
  color: var(--dono-correct); font-family: var(--font-display); font-weight: 800;
  animation: streakAdd 700ms ease both;
}
@keyframes flamePulse { from { transform: translateY(1px) scale(.96); } to { transform: translateY(-1px) scale(1.08); } }
@keyframes streakAdd { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
.life-icons { display: inline-flex; gap: 4px; vertical-align: middle; }
.life-dot {
  width: 12px; height: 12px; border-radius: 999px; border: 2px solid var(--dono-wrong);
  display: inline-block; background: transparent;
}
.life-dot.full { background: var(--dono-wrong); }
.timer-stat b { color: var(--dono-brand); min-width: 42px; display: inline-block; }
.end-run-btn {
  background: none; border: 1px solid var(--dono-line); border-radius: 999px;
  padding: 6px 14px; font-size: 13px; color: var(--dono-ink-soft);
}
.end-run-btn:hover { border-color: var(--dono-ink-soft); color: var(--dono-ink); }
.restart-btn { background: var(--dono-brand-soft); border-color: transparent; color: var(--dono-brand-dark); }

/* ── Duel cards ─────────────────────────────────────────── */
.duel { display: grid; grid-template-columns: 1fr auto 1fr; gap: 14px; align-items: stretch; }
.uni-card {
  background: var(--dono-card); border: 1px solid var(--dono-line);
  border-radius: var(--radius); box-shadow: var(--shadow);
  padding: clamp(18px, 3vw, 30px); text-align: center;
  display: flex; flex-direction: column; justify-content: center; min-height: 210px;
  color: inherit; width: 100%;
}
.uni-card:disabled { cursor: default; opacity: 1; }
.uni-card.tappable:hover { border-color: var(--dono-brand); transform: translateY(-2px); }
.uni-name {
  font-family: var(--font-display); font-weight: 700;
  font-size: clamp(19px, 2.6vw, 25px); line-height: 1.2; text-wrap: balance;
}
.uni-country { font-size: 13px; color: var(--dono-ink-soft); margin-top: 6px; }
.uni-rank {
  font-family: var(--font-display); font-weight: 800;
  font-size: clamp(40px, 6vw, 58px); letter-spacing: -0.02em;
  color: var(--dono-brand); margin-top: 12px; line-height: 1;
}
.uni-rank .of { display: block; font-size: 12px; font-weight: 500; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--dono-ink-soft); margin-top: 6px; }
.uni-rank.hidden-rank { color: var(--dono-ink-soft); }
.uni-rank.revealing { animation: rankPop 320ms cubic-bezier(.2,.9,.3,1.4) both; }
@keyframes rankPop { from { opacity: 0; transform: scale(.6); } to { opacity: 1; transform: scale(1); } }

.vs-spine { display: flex; align-items: center; justify-content: center; }
.vs-badge {
  font-family: var(--font-display); font-weight: 800; font-size: 15px;
  background: var(--dono-ink); color: var(--dono-paper);
  border-radius: 999px; width: 44px; height: 44px;
  display: grid; place-items: center;
}

/* ── Guess buttons ──────────────────────────────────────── */
.guess-row { display: flex; gap: 14px; margin-top: 18px; }
.guess-btn {
  flex: 1; padding: 18px 10px; border-radius: var(--radius); border: none;
  font-family: var(--font-display); font-weight: 700; font-size: 20px;
  background: var(--dono-brand); color: #fff;
  transition: background 140ms ease, transform 140ms ease;
}
.guess-btn:hover:enabled { background: var(--dono-brand-dark); transform: translateY(-2px); }
.guess-btn:disabled { opacity: 0.45; cursor: not-allowed; }
.guess-btn .key-hint { display: block; font-family: var(--font-body); font-weight: 500; font-size: 12px; opacity: .8; margin-top: 3px; }
.key-symbol { font-size: 15px; margin-left: 4px; }
.guess-btn.lower { background: var(--dono-ink); }
.guess-btn.lower:hover:enabled { background: #000; }

/* ── Result panel ───────────────────────────────────────── */
.result-panel {
  margin-top: 18px; border-radius: var(--radius); padding: 16px 20px;
  display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap;
  border: 1.5px solid;
}
.result-panel.correct { background: var(--dono-correct-soft); border-color: var(--dono-correct); }
.result-panel.wrong { background: var(--dono-wrong-soft); border-color: var(--dono-wrong); }
.result-text { font-weight: 600; }
.result-text .verdict { font-family: var(--font-display); font-weight: 800; margin-right: 8px; }
.result-panel.correct .verdict { color: var(--dono-correct); }
.result-panel.wrong .verdict { color: var(--dono-wrong); }
.result-sub { display: block; font-weight: 400; font-size: 14px; color: var(--dono-ink-soft); margin-top: 2px; }
.result-actions { display: flex; align-items: center; gap: 12px; }
.points-chip {
  font-family: var(--font-display); font-weight: 800; font-size: 17px;
  padding: 6px 12px; border-radius: 999px; background: var(--dono-card);
}
.points-chip.gain { color: var(--dono-correct); }
.points-chip.loss { color: var(--dono-wrong); }
.auto-next { font-size: 13px; color: var(--dono-ink-soft); }
.next-btn {
  border: none; border-radius: 999px; padding: 12px 26px;
  background: var(--dono-ink); color: #fff; font-weight: 600; font-size: 15px;
}
.next-btn:hover { background: #000; }

/* ── Persistent in-game CTA / footer ────────────────────── */
.dono-footer {
  margin-top: auto; padding: 18px clamp(16px, 4vw, 40px);
  text-align: center; font-size: 13px; color: var(--dono-ink-soft);
  border-top: 1px solid var(--dono-line);
}
.dono-footer a { font-weight: 600; text-decoration: none; }
.dono-footer a:hover { text-decoration: underline; }

/* ── Game over ──────────────────────────────────────────── */
.over { text-align: center; margin: auto 0; padding: 20px 0 40px; }
.over .over-kicker {
  font-size: 13px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--dono-ink-soft);
}
.over h2 {
  font-family: var(--font-display); font-weight: 800;
  font-size: clamp(30px, 5vw, 44px); margin: 8px 0 26px; letter-spacing: -0.02em;
}
.over-stats {
  display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 30px;
}
.over-stat {
  background: var(--dono-card); border: 1px solid var(--dono-line);
  border-radius: var(--radius); padding: 16px 22px; min-width: 128px; box-shadow: var(--shadow);
}
.over-stat b { display: block; font-family: var(--font-display); font-size: 34px; font-weight: 800; color: var(--dono-brand); }
.over-stat span { font-size: 13px; color: var(--dono-ink-soft); }
.over-stat.record { background: var(--dono-accent); border-color: var(--dono-accent); }
.over-stat.record b, .over-stat.record span { color: var(--dono-ink); }
.ended-line { color: var(--dono-ink-soft); margin: -12px auto 24px; max-width: 56ch; font-size: 14px; }
.over-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 34px; }
.share-status, .daily-limitation {
  color: var(--dono-ink-soft); font-size: 13px; max-width: 58ch; margin: -16px auto 22px;
}
.daily-limitation { margin-top: 18px; margin-bottom: 0; }
.btn-primary, .btn-secondary, .btn-cta {
  border-radius: 999px; padding: 13px 26px; font-weight: 600; font-size: 15px; border: none;
  text-decoration: none; display: inline-block;
}
.btn-primary { background: var(--dono-brand); color: #fff; }
.btn-primary:hover { background: var(--dono-brand-dark); }
.btn-secondary { background: var(--dono-card); color: var(--dono-ink); border: 1.5px solid var(--dono-line); }
.btn-secondary:hover { border-color: var(--dono-ink-soft); }
.cta-block {
  background: var(--dono-brand-soft); border-radius: var(--radius);
  padding: 24px; max-width: 560px; margin: 0 auto;
}
.cta-block p { font-size: 15px; margin-bottom: 14px; color: var(--dono-brand-dark); font-weight: 500; }
.btn-cta { background: var(--dono-brand); color: #fff; font-family: var(--font-display); font-weight: 700; }
.btn-cta:hover { background: var(--dono-brand-dark); }

/* ── Error state ────────────────────────────────────────── */
.error-box {
  margin: auto; max-width: 480px; text-align: center;
  background: var(--dono-wrong-soft); border: 1.5px solid var(--dono-wrong);
  border-radius: var(--radius); padding: 28px;
}
.error-box h2 { font-family: var(--font-display); margin-bottom: 8px; }
.error-box p { color: var(--dono-ink-soft); font-size: 15px; }

/* ── Responsive ─────────────────────────────────────────── */
@media (max-width: 640px) {
  .duel { grid-template-columns: 1fr; }
  .vs-spine { padding: 0; }
  .uni-card { min-height: 150px; }
  .stats { gap: 12px; }
  .header-note { display: none; }
  .setup-grid { grid-template-columns: 1fr; }
  .how-steps { grid-template-columns: 1fr; }
  .setup-option { min-height: 0; }
  .start-panel { flex-direction: column; align-items: stretch; }
  .setup-actions { justify-content: stretch; }
  .setup-actions .btn-primary, .setup-actions .btn-secondary { flex: 1; }
  .setup-summary { text-align: center; }
  .guess-row { position: sticky; bottom: 10px; z-index: 2; }
}

/* ── Reduced motion ─────────────────────────────────────── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation: none !important; transition: none !important; }
}
</style>
</head>
<body>

<header class="site-header">
  <a class="wordmark" id="wordmark" href="./">Dono <span class="games">Games</span></a>
  <button class="how-to-play-btn" id="how-to-play" type="button">How to play</button>
</header>

<dialog class="how-to-play-dialog" id="how-to-play-dialog" aria-labelledby="how-to-play-title">
  <div class="how-to-play-panel">
    <button class="dialog-close" id="close-how-to-play" type="button" aria-label="Close how to play">×</button>
    <h2 id="how-to-play-title">How to play</h2>
    <p>Choose whether the hidden university is ranked higher or lower than the one you can see.</p>
    <div class="how-steps">
      <div class="how-step"><span class="how-visual" aria-hidden="true">#12</span><b>Read the rank</b><span>Smaller numbers are higher ranked.</span></div>
      <div class="how-step"><span class="how-visual" aria-hidden="true">?</span><b>Make your call</b><span>Is the hidden university closer to #1?</span></div>
      <div class="how-step"><span class="how-visual" aria-hidden="true">↑ ↓</span><b>Keep scoring</b><span>Choose higher or lower and build your streak.</span></div>
    </div>
    <button class="btn-primary" id="got-it" type="button">Got it</button>
  </div>
</dialog>

<main id="app" aria-live="off"></main>
<div class="sr-only" role="status" aria-live="polite" id="announcer"></div>

<footer class="dono-footer">
  <span id="footer-tagline"></span>
</footer>

<script src="game-core.js"></script>

<script>

/* ============================================================
   UI LAYER — rendering, input, timer management and persistence.
   Core rules live in game-core.js so they can be tested in Node.
   ============================================================ */
(async function () {
  'use strict';

  const core = window.DonoHOL;
  const app = document.getElementById('app');
  const announcer = document.getElementById('announcer');
  const storagePrefix = 'dono_hol_';
  const revealDelayMs = 1000;

  const DEFAULT_SETTINGS = {
    format: core.FORMAT.LIVES,
    pool: core.POOL.GLOBAL,
    difficulty: core.DIFFICULTY.NORMAL,
  };

  const FORMAT_COPY = {
    sudden: {
      title: 'Sudden Death',
      desc: 'One mistake ends the run. How long can you keep your streak alive?',
    },
    lives: {
      title: 'Three Lives',
      desc: 'Build the highest score you can. Three wrong answers end the run.',
      badge: 'Recommended',
    },
    timed: {
      title: '60 Seconds',
      desc: 'Race against the clock and score as many points as possible in 60 seconds.',
    },
    daily: {
      title: 'Daily Challenge',
      desc: 'One shared challenge for everyone today.',
    },
  };

  const POOL_COPY = {
    global: 'Every eligible university',
    top200: 'Exact ranks 1 to 200',
    top50: 'Exact ranks 1 to 50',
    uk: 'United Kingdom institutions',
    us: 'United States institutions',
  };

  const DIFFICULTY_COPY = {
    easy: 'More forgiving comparisons',
    normal: 'Balanced comparisons',
    hard: 'Tough close calls',
  };

  const wm = document.getElementById('wordmark');
  if (DONO_CONFIG.logoUrl) {
    wm.innerHTML = '<img src="' + DONO_CONFIG.logoUrl + '" alt="' + DONO_CONFIG.brandName + '">';
  }
  const headerCta = document.getElementById('header-cta');
  const footerCta = document.getElementById('footer-cta');
  if (headerCta) headerCta.href = DONO_CONFIG.websiteUrl;
  if (footerCta) footerCta.href = DONO_CONFIG.websiteUrl;
  document.getElementById('footer-tagline').textContent = DONO_CONFIG.tagline;

  let dataset;
  try {
    const response = await fetch('data/university-rankings-2027.csv');
    if (!response.ok) throw new Error('The rankings CSV could not be loaded.');
    dataset = core.loadUniversities(await response.text());
  } catch (error) {
    dataset = { universities: [], dailyUniversities: [], excludedBanded: 0, error: 'The rankings CSV could not be loaded.' };
  }
  const universities = dataset.universities;
  const dailyUniversities = dataset.dailyUniversities || universities;
  let settings = loadSettings();
  let game = null;
  let dailyGame = null;
  let dailyPractice = false;
  let busy = false;
  let timerId = null;
  let timedAutoNextId = null;
  let lastTimeWarning = null;

  const howToPlayDialog = document.getElementById('how-to-play-dialog');
  const closeHowToPlay = () => howToPlayDialog.close();
  document.getElementById('how-to-play').addEventListener('click', () => howToPlayDialog.showModal());
  document.getElementById('close-how-to-play').addEventListener('click', closeHowToPlay);
  document.getElementById('got-it').addEventListener('click', closeHowToPlay);

  function esc(value) {
    return String(value).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  }

  function browserStorage() {
    try { return window.localStorage; } catch (e) { return null; }
  }

  function safeRead(key, fallback) {
    try {
      const storage = browserStorage();
      const value = storage ? storage.getItem(key) : null;
      return value === null ? fallback : value;
    } catch (e) {
      return fallback;
    }
  }

  function safeWrite(key, value) {
    try {
      const storage = browserStorage();
      if (storage) storage.setItem(key, String(value));
    } catch (e) { /* storage may be unavailable */ }
  }

  function safeRemove(key) {
    try {
      const storage = browserStorage();
      if (storage) storage.removeItem(key);
    } catch (e) { /* storage may be unavailable */ }
  }

  function loadSettings() {
    return {
      format: safeRead(storagePrefix + 'last_format', DEFAULT_SETTINGS.format),
      pool: safeRead(storagePrefix + 'last_pool', DEFAULT_SETTINGS.pool),
      difficulty: safeRead(storagePrefix + 'last_difficulty', DEFAULT_SETTINGS.difficulty),
    };
  }

  function saveSettings() {
    safeWrite(storagePrefix + 'last_format', settings.format);
    safeWrite(storagePrefix + 'last_pool', settings.pool);
    safeWrite(storagePrefix + 'last_difficulty', settings.difficulty);
  }

  function bestKey(config) {
    return storagePrefix + 'best_' + config.format + '_' + config.pool + (config.pool === core.POOL.GLOBAL ? '_' + config.difficulty : '');
  }

  function readBest(config) {
    return parseInt(safeRead(bestKey(config), '0'), 10) || 0;
  }

  function writeBest(config, score) {
    if (score > readBest(config)) safeWrite(bestKey(config), score);
  }

  function announce(text) {
    announcer.textContent = text;
  }

  function clearTimers() {
    if (timerId) window.clearInterval(timerId);
    if (timedAutoNextId) window.clearTimeout(timedAutoNextId);
    timerId = null;
    timedAutoNextId = null;
  }

  function configSummary(config) {
    return [
      core.FORMAT_LABELS[config.format],
      core.POOL_LABELS[config.pool],
      config.pool === core.POOL.GLOBAL ? core.DIFFICULTY_RULES[config.difficulty].label : null,
    ].filter(Boolean).join(' · ');
  }

  function poolCount(pool) {
    return core.buildPool(universities, pool).length;
  }

  function currentBestLabel(config) {
    const best = readBest(config);
    return best ? '<span class="setup-best">Best: <b>' + best + '</b></span>' : '';
  }

  function randomiseSettings() {
    const formats = [core.FORMAT.SUDDEN, core.FORMAT.LIVES, core.FORMAT.TIMED];
    if (officialDailyStatus() !== 'completed') formats.push(core.FORMAT.DAILY);
    const pools = [core.POOL.GLOBAL, core.POOL.TOP200, core.POOL.TOP50, core.POOL.UK, core.POOL.US];
    const difficulties = [core.DIFFICULTY.EASY, core.DIFFICULTY.NORMAL, core.DIFFICULTY.HARD];
    settings.format = formats[Math.floor(Math.random() * formats.length)];
    settings.pool = pools[Math.floor(Math.random() * pools.length)];
    settings.difficulty = difficulties[Math.floor(Math.random() * difficulties.length)];
    renderLanding();
    announce('Random settings selected.');
  }

  function dailyOptions(extra) {
    return Object.assign({
      dateKey: core.getDailyDateKey(),
      version: core.DAILY_VERSION,
      dataset: core.DATASET_VERSION,
      pool: core.POOL.GLOBAL,
      practice: false,
    }, extra || {});
  }

  function dailyKey(options) {
    return core.dailyStorageKey(dailyOptions(options));
  }

  function loadTodayDailyState() {
    return core.loadDailyState(browserStorage(), dailyKey());
  }

  function saveCurrentDailyState() {
    if (!dailyGame || dailyPractice) return false;
    const saved = core.serialiseDailyGameState(dailyGame.rawState);
    const ok = core.saveDailyState(browserStorage(), dailyKey(saved), saved);
    if (saved.completed) {
      core.saveDailyState(browserStorage(), core.dailyLastCompletedKey(saved), saved);
    }
    return ok;
  }

  function officialDailyStatus() {
    const state = loadTodayDailyState();
    if (!state) return 'new';
    return state.completed ? 'completed' : 'resume';
  }

  function renderError(message) {
    clearTimers();
    app.innerHTML = '<div class="screen error-box"><h2>The game can\u2019t start</h2><p>' + esc(message) + '</p></div>';
  }

  function optionButton(group, value, title, description, active, badge) {
    return '<button class="setup-option' + (active ? ' selected' : '') + '" data-group="' + group + '" data-value="' + value + '" aria-pressed="' + active + '">' +
      '<span class="option-heading"><span>' + esc(title) + '</span>' + (badge ? '<span class="option-badge">' + esc(badge) + '</span>' : '') + '</span>' +
      '<span class="mode-desc">' + esc(description) + '</span>' +
    '</button>';
  }

  function renderLanding() {
    clearTimers();
    busy = false;
    game = null;
    dailyGame = null;
    dailyPractice = false;
    saveSettings();
    const isDaily = settings.format === core.FORMAT.DAILY;
    const showDifficulty = !isDaily && settings.pool === core.POOL.GLOBAL;
    const effectiveConfig = Object.assign({}, settings);
    const dailyDate = core.formatDailyDate(core.getDailyDateKey());
    const dailyState = loadTodayDailyState();
    const dailyStatus = officialDailyStatus();
    const dailyAction = dailyStatus === 'completed' ? 'View today’s result' : dailyStatus === 'resume' ? 'Resume Daily Challenge' : 'Start Game';
    app.innerHTML =
      '<div class="screen landing setup-screen">' +
        '<h1><span class="hi">Higher</span> or <span class="lo">Lower</span>?</h1>' +
        '<p class="lede">Guess which university is closer to #1 in the world rankings.</p>' +
        '<p class="dataset">Pick a format, choose your universities, then start guessing.</p>' +
        '<section class="setup-section" aria-labelledby="format-heading"><h2 id="format-heading">How do you want to play?</h2><div class="setup-grid">' +
          optionButton('format', 'sudden', FORMAT_COPY.sudden.title, FORMAT_COPY.sudden.desc, settings.format === 'sudden') +
          optionButton('format', 'lives', FORMAT_COPY.lives.title, FORMAT_COPY.lives.desc, settings.format === 'lives', FORMAT_COPY.lives.badge) +
          optionButton('format', 'timed', FORMAT_COPY.timed.title, FORMAT_COPY.timed.desc, settings.format === 'timed') +
          optionButton('format', 'daily', FORMAT_COPY.daily.title, FORMAT_COPY.daily.desc, settings.format === 'daily') +
        '</div></section>' +
        (isDaily
          ? '<section class="setup-section daily-note" aria-labelledby="daily-heading"><h2 id="daily-heading">Today’s challenge</h2><p>Daily Challenge · ' + esc(dailyDate) + ' · Global pool · all ' + dailyUniversities.length + ' published universities</p>' +
            (dailyState ? '<p class="daily-status">' + (dailyState.completed ? 'Official attempt completed. Practice replays are clearly labelled and do not change your score.' : 'Official attempt in progress. You can resume from this device.') + '</p>' : '') + '</section>'
          : '<section class="setup-section" aria-labelledby="pool-heading"><h2 id="pool-heading">Which universities?</h2><div class="setup-grid">' +
          ['global','top200','top50','uk','us'].map(pool => optionButton('pool', pool, core.POOL_LABELS[pool], '', settings.pool === pool)).join('') +
        '</div></section>') +
        (showDifficulty ? '<section class="setup-section" aria-labelledby="difficulty-heading"><h2 id="difficulty-heading">How difficult?</h2><div class="setup-grid compact">' +
          ['easy','normal','hard'].map(diff => optionButton('difficulty', diff, core.DIFFICULTY_RULES[diff].label, DIFFICULTY_COPY[diff], settings.difficulty === diff)).join('') +
        '</div></section>' : '') +
        '<div class="start-panel"><p class="setup-summary">' + esc(isDaily ? 'Daily Challenge · ' + dailyDate : configSummary(effectiveConfig)) + (isDaily ? '' : currentBestLabel(effectiveConfig)) + '</p>' +
          '<div class="setup-actions"><button class="btn-secondary" id="randomise-settings">Randomise</button>' +
          '<button class="btn-primary start-btn" id="start-game">' + esc(isDaily ? dailyAction : 'Start Game') + '</button>' +
          (isDaily && dailyStatus === 'completed' ? '<button class="btn-secondary" id="practice-daily">Practise again</button>' : '') + '</div></div>' +
      '</div>';

    app.querySelectorAll('.setup-option').forEach(button => {
      button.addEventListener('click', () => {
        settings[button.dataset.group] = button.dataset.value;
        renderLanding();
      });
    });
    document.getElementById('randomise-settings').addEventListener('click', randomiseSettings);
    document.getElementById('start-game').addEventListener('click', isDaily ? startDailyOfficial : startGame);
    const practiceButton = document.getElementById('practice-daily');
    if (practiceButton) practiceButton.addEventListener('click', () => startDailyPractice());
    document.getElementById('start-game').focus();
  }

  function startDailyOfficial() {
    clearTimers();
    saveSettings();
    dailyPractice = false;
    const saved = loadTodayDailyState();
    if (saved && saved.completed) {
      try {
        dailyGame = core.createDailyGame(dailyUniversities, dailyOptions(), saved);
      } catch (error) {
        renderError(error.message);
        return;
      }
      renderDailyGameOver();
      return;
    }
    try {
      dailyGame = core.createDailyGame(dailyUniversities, dailyOptions(), saved);
      saveCurrentDailyState();
    } catch (error) {
      renderError(error.message);
      return;
    }
    renderDailyCurrent();
    announce('Daily Challenge started for ' + core.formatDailyDate(core.getDailyDateKey()) + '.');
  }

  function startDailyPractice() {
    clearTimers();
    dailyPractice = true;
    try {
      dailyGame = core.createDailyGame(dailyUniversities, dailyOptions({ practice: true }));
      dailyGame.rawState.practice = true;
    } catch (error) {
      renderError(error.message);
      return;
    }
    renderDailyCurrent();
    announce('Practice Daily Challenge started for ' + core.formatDailyDate(core.getDailyDateKey()) + '.');
  }

  function startGame() {
    clearTimers();
    saveSettings();
    try {
      game = core.createGame(universities, settings);
    } catch (error) {
      renderError(error.message);
      return;
    }
    lastTimeWarning = null;
    renderRound();
    announce('New ' + configSummary(settings) + ' game started.');
  }

  function dailyStatusBar() {
    const s = dailyGame.state;
    return '<div class="status-bar"><span class="mode-chip">Daily Challenge · ' + esc(core.formatDailyDate(s.date)) + (s.practice ? ' · Practice' : '') + '</span><div class="stats">' +
      '<span class="stat">Score<b>' + s.score + '</b></span>' +
      livesMarkup(s.livesRemaining) +
      streakStat(s.streak) +
      multiplierStat(s.streak + 1) +
      '</div><button class="end-run-btn restart-btn" id="restart-game" type="button">Restart</button></div>';
  }

  function renderDailyCurrent() {
    const s = dailyGame.state;
    if (s.phase === 'over' || s.completed) {
      renderDailyGameOver();
    } else if (s.phase === 'revealed' && s.lastResult) {
      renderDailyReveal(s.lastResult);
    } else {
      renderDailyRound();
    }
  }

  function renderDailyRound() {
    busy = false;
    const s = dailyGame.state;
    app.innerHTML =
      '<div class="screen game-screen">' + dailyStatusBar() +
        '<div class="duel">' +
          card(s.current, { showRank: true }) +
          '<div class="vs-spine"><span class="vs-badge" aria-hidden="true">vs</span></div>' +
          card(s.challenger, { showRank: false, tappable: true, guess: 'higher' }) +
        '</div>' +
        '<div class="guess-row" role="group" aria-label="Your Daily Challenge guess">' +
          '<button class="guess-btn" id="guess-higher">Higher ranked<span class="key-symbol" aria-hidden="true">↑</span><span class="key-hint">Closer to #1 · press H or ↑</span></button>' +
          '<button class="guess-btn lower" id="guess-lower">Lower ranked<span class="key-symbol" aria-hidden="true">↓</span><span class="key-hint">Further from #1 · press L or ↓</span></button>' +
        '</div>' +
      '</div>';
    document.getElementById('guess-higher').addEventListener('click', () => onDailyGuess(true));
    document.getElementById('guess-lower').addEventListener('click', () => onDailyGuess(false));
    bindRestartButton();
    app.querySelector('.uni-card.tappable').addEventListener('click', () => onDailyGuess(true));
    announce('Daily Challenge comparison. Is ' + s.challenger.name + ' ranked higher or lower than ' + s.current.name + '?');
  }

  function onDailyGuess(guessHigher) {
    if (busy || !dailyGame || dailyGame.state.phase !== 'guessing') return;
    busy = true;
    const result = dailyGame.guess(guessHigher);
    if (!result) return;
    saveCurrentDailyState();
    renderDailyReveal(result);
  }

  function dailyRelationText(result) {
    return result.challenger.name + ' is ranked ' + (result.challengerIsHigher ? 'higher' : 'lower') +
      ' than ' + result.current.name + ' (' + rankText(result.challenger) + ' vs ' + rankText(result.current) + ').';
  }

  function renderDailyReveal(result) {
    const s = dailyGame.state;
    const ending = s.phase === 'over' || s.completed;
    app.innerHTML =
      '<div class="screen game-screen">' + dailyStatusBar() +
        '<div class="duel">' +
          card(result.current, { showRank: true }) +
          '<div class="vs-spine"><span class="vs-badge" aria-hidden="true">vs</span></div>' +
          card(result.challenger, { showRank: true, reveal: true }) +
        '</div>' +
        '<div class="result-panel ' + (result.wasCorrect ? 'correct' : 'wrong') + '">' +
          '<span class="result-text"><span class="verdict"><span aria-hidden="true">' + (result.wasCorrect ? '✓' : '✕') + '</span> ' + (result.wasCorrect ? 'Correct' : 'Incorrect') + '</span>' +
            '<span class="result-sub">' + esc(dailyRelationText(result)) + (result.lifeLost ? ' One life lost. ' + s.livesRemaining + ' lives remaining.' : '') + '</span></span>' +
          '<span class="result-actions">' + streakAddition(result) + '<span class="points-chip gain">+' + result.points + '</span>' +
            '<button class="next-btn" id="next-btn">' + (ending ? 'See results' : 'Next round') + '<span class="sr-only"> (press Enter)</span></button>' +
          '</span>' +
        '</div>' +
      '</div>';
    document.getElementById('next-btn').addEventListener('click', ending ? renderDailyGameOver : onDailyNext);
    bindRestartButton();
    document.getElementById('next-btn').focus();
    announce((result.wasCorrect ? 'Correct. ' : 'Incorrect. ') + dailyRelationText(result) + ' Points gained ' + result.points + '. ' + (result.lifeLost ? s.livesRemaining + ' lives remaining. ' : '') + 'Score ' + s.score + '.');
    if (!ending) autoNext(onDailyNext);
  }

  function onDailyNext() {
    if (!dailyGame || dailyGame.state.phase !== 'revealed') return;
    dailyGame.next();
    saveCurrentDailyState();
    renderDailyCurrent();
  }

  function statusBar() {
    const s = game.state;
    const config = s.config;
    const label = configSummary(config);
    const streak = streakStat(s.streak);
    let stats = '';
    if (config.format === core.FORMAT.SUDDEN) {
      stats = '<span class="stat">Score<b>' + s.score + '</b></span>' + streak + '<span class="stat">Best<b>' + readBest(config) + '</b></span>';
    } else if (config.format === core.FORMAT.LIVES) {
      stats = '<span class="stat">Score<b>' + s.score + '</b></span>' + livesMarkup(s.lives) + streak + multiplierStat(s.streak + 1);
    } else {
      stats = '<span class="stat">Score<b>' + s.score + '</b></span><span class="stat timer-stat">Time<b>' + s.timeRemaining + 's</b></span><span class="stat">Correct<b>' + s.correct + '</b></span>' + streak;
    }
    return '<div class="status-bar"><span class="mode-chip">' + esc(label) + '</span><div class="stats">' + stats + '</div><button class="end-run-btn restart-btn" id="restart-game" type="button">Restart</button></div>';
  }

  function autoNext(callback) {
    if (timedAutoNextId) window.clearTimeout(timedAutoNextId);
    timedAutoNextId = window.setTimeout(() => {
      timedAutoNextId = null;
      callback();
    }, revealDelayMs);
  }

  function streakStat(streak) {
    const hot = streak >= 3 ? ' streak-hot' : '';
    const flame = streak >= 2 ? '<span class="streak-flame" aria-hidden="true">🔥</span>' : '';
    return '<span class="stat streak-stat' + hot + '">Streak<b>' + flame + streak + '</b></span>';
  }

  function multiplierStat(nextStreak) {
    const points = core.pointsForLivesStreak(nextStreak);
    return '<span class="stat">Next <span class="multiplier-pill"><span aria-hidden="true">🔥</span>+' + points + '</span></span>';
  }

  function streakAddition(result) {
    return result.wasCorrect ? '<span class="streak-add"><span aria-hidden="true">🔥</span> +1 streak</span>' : '';
  }

  function livesMarkup(lives) {
    let icons = '';
    for (let i = 1; i <= 3; i++) icons += '<span class="life-dot' + (i <= lives ? ' full' : '') + '" aria-hidden="true"></span>';
    return '<span class="stat lives-stat"><span class="sr-only">Lives remaining ' + lives + ' of 3 </span><span class="life-icons" aria-hidden="true">' + icons + '</span><b>' + lives + '/3</b></span>';
  }

  function rankText(university) {
    return university.rankBand || core.ordinal(university.rank);
  }

  function restartCurrentGame() {
    clearTimers();
    if (!dailyGame) {
      startGame();
      return;
    }
    if (!dailyPractice) safeRemove(dailyKey());
    if (dailyPractice) startDailyPractice();
    else startDailyOfficial();
  }

  function bindRestartButton() {
    const button = document.getElementById('restart-game');
    if (button) button.addEventListener('click', restartCurrentGame);
  }

  function card(university, opts) {
    const rankHTML = opts.showRank
      ? '<div class="uni-rank' + (opts.reveal ? ' revealing' : '') + '">' + rankText(university) + '<span class="of">in the world</span></div>'
      : '<div class="uni-rank hidden-rank" aria-label="ranking hidden">?<span class="of">higher or lower?</span></div>';
    return '<button class="uni-card' + (opts.tappable ? ' tappable' : '') + '" ' + (opts.guess !== undefined ? 'data-guess="' + opts.guess + '"' : 'tabindex="-1" disabled') + '>' +
      '<span class="uni-name">' + esc(university.name) + '</span>' +
      (university.country ? '<span class="uni-country">' + esc(university.country) + '</span>' : '') + rankHTML +
    '</button>';
  }

  function renderRound() {
    busy = false;
    const s = game.state;
    app.innerHTML =
      '<div class="screen game-screen">' + statusBar() +
        '<div class="duel">' +
          card(s.current, { showRank: true }) +
          '<div class="vs-spine"><span class="vs-badge" aria-hidden="true">vs</span></div>' +
          card(s.challenger, { showRank: false, tappable: true, guess: 'higher' }) +
        '</div>' +
        '<div class="guess-row" role="group" aria-label="Your guess">' +
          '<button class="guess-btn" id="guess-higher">Higher ranked<span class="key-symbol" aria-hidden="true">↑</span><span class="key-hint">Closer to #1 · press H or ↑</span></button>' +
          '<button class="guess-btn lower" id="guess-lower">Lower ranked<span class="key-symbol" aria-hidden="true">↓</span><span class="key-hint">Further from #1 · press L or ↓</span></button>' +
        '</div>' +
      '</div>';
    document.getElementById('guess-higher').addEventListener('click', () => onGuess(true));
    document.getElementById('guess-lower').addEventListener('click', () => onGuess(false));
    bindRestartButton();
    app.querySelector('.uni-card.tappable').addEventListener('click', () => onGuess(true));
    announce('New comparison. Is ' + s.challenger.name + ' ranked higher or lower than ' + s.current.name + ', which is ' + core.ordinal(s.current.rank) + ' in the world?');
  }

  function relationText(result) {
    return result.challenger.name + ' is ranked ' + (result.challengerIsHigher ? 'higher' : 'lower') + ' than ' + result.current.name + ' (' + rankText(result.challenger) + ' vs ' + rankText(result.current) + ').';
  }

  function pointsText(result) {
    if (result.points > 0) return '+' + result.points;
    if (result.points < 0) return String(result.points);
    return '0';
  }

  function onGuess(guessHigher) {
    if (busy || !game || game.state.phase !== 'guessing') return;
    if (game.state.config.format === core.FORMAT.TIMED && game.state.timeRemaining <= 0) return;
    busy = true;
    const wasFirstTimedAnswer = game.state.config.format === core.FORMAT.TIMED && !game.state.timerStarted;
    const result = game.guess(guessHigher);
    if (!result) return;
    if (wasFirstTimedAnswer) startTimer();
    renderReveal(result);
  }

  function renderReveal(result) {
    const s = game.state;
    const ending = s.phase === 'over';
    const timed = s.config.format === core.FORMAT.TIMED;
    if (timed && !ending) {
      game.next();
      renderRound();
      return;
    }
    const nextLabel = ending ? 'See results' : 'Next round';
    app.innerHTML =
      '<div class="screen game-screen">' + statusBar() +
        '<div class="duel">' +
          card(result.current, { showRank: true }) +
          '<div class="vs-spine"><span class="vs-badge" aria-hidden="true">vs</span></div>' +
          card(result.challenger, { showRank: true, reveal: true }) +
        '</div>' +
        '<div class="result-panel ' + (result.wasCorrect ? 'correct' : 'wrong') + '">' +
          '<span class="result-text"><span class="verdict"><span aria-hidden="true">' + (result.wasCorrect ? '✓' : '✕') + '</span> ' + (result.wasCorrect ? 'Correct' : 'Incorrect') + '</span>' +
            '<span class="result-sub">' + esc(relationText(result)) + (result.lifeLost ? ' One life lost.' : '') + '</span></span>' +
          '<span class="result-actions">' + streakAddition(result) + '<span class="points-chip ' + (result.points >= 0 ? 'gain' : 'loss') + '">' + pointsText(result) + '</span>' +
            '<button class="next-btn" id="next-btn">' + nextLabel + '<span class="sr-only"> (press Enter)</span></button>' +
          '</span>' +
        '</div>' +
      '</div>';
    announce((result.wasCorrect ? 'Correct. ' : 'Incorrect. ') + relationText(result) + ' Points ' + pointsText(result) + '. ' + (result.lifeLost ? s.lives + ' lives remaining. ' : '') + 'Score ' + s.score + '.');

    document.getElementById('next-btn').addEventListener('click', ending ? renderGameOver : onNext);
    document.getElementById('next-btn').focus();
    bindRestartButton();
    if (!ending) autoNext(onNext);
  }

  function onNext() {
    if (!game || game.state.phase !== 'revealed') return;
    game.next();
    renderRound();
  }

  function startTimer() {
    if (timerId) return;
    timerId = window.setInterval(() => {
      if (!game || game.state.config.format !== core.FORMAT.TIMED) return;
      const remaining = game.tick(1);
      if ([30, 10, 5].includes(remaining) && lastTimeWarning !== remaining) {
        lastTimeWarning = remaining;
        announce(remaining + ' seconds remaining.');
      }
      if (remaining <= 0) {
        clearTimers();
        announce('Time is up. Game over.');
        renderGameOver();
      } else {
        const timer = app.querySelector('.timer-stat b');
        if (timer) timer.textContent = remaining + 's';
      }
    }, 1000);
  }

  function resultStats() {
    const s = game.state;
    const accuracyText = core.accuracy(s.correct, s.attempts) + '%';
    const stats = [
      ['Final score', s.score],
      ['Longest streak', s.bestStreak],
    ];
    if (s.config.format !== core.FORMAT.SUDDEN) {
      stats.push(['Correct', s.correct], ['Incorrect', s.incorrect], ['Accuracy', accuracyText]);
    }
    if (s.config.format === core.FORMAT.TIMED) stats.push(['Attempts', s.attempts]);
    stats.push(['Best score', Math.max(readBest(s.config), s.score)]);
    return stats.map(([label, value]) => '<div class="over-stat"><b>' + value + '</b><span>' + esc(label) + '</span></div>').join('');
  }

  function dailyResultStats() {
    const s = dailyGame.state;
    const attempts = s.answerPattern.length;
    const reached = s.current ? s.current.name : 'Sequence complete';
    const stats = [
      ['Final score', s.score],
      ['Correct', s.correct],
      ['Incorrect', s.incorrect],
      ['Accuracy', core.accuracy(s.correct, attempts) + '%'],
      ['Longest streak', s.bestStreak],
      ['Comparisons', attempts],
      ['Lives used', 3 - s.livesRemaining],
    ];
    return '<div class="over-stats">' + stats.map(([label, value]) => '<div class="over-stat"><b>' + value + '</b><span>' + esc(label) + '</span></div>').join('') + '</div>' +
      '<p class="ended-line">University reached: ' + esc(reached) + '</p>';
  }

  function renderDailyGameOver() {
    if (!dailyGame) return;
    clearTimers();
    busy = false;
    dailyGame.complete();
    saveCurrentDailyState();
    const s = dailyGame.state;
    const officialLabel = s.practice ? 'Practice replay' : 'Official attempt';
    app.innerHTML =
      '<div class="screen over daily-over">' +
        '<p class="over-kicker">Daily Challenge · ' + esc(core.formatDailyDate(s.date)) + ' · ' + esc(officialLabel) + '</p>' +
        '<h2>' + (s.practice ? 'Practice complete.' : 'Today’s result.') + '</h2>' +
        dailyResultStats() +
        '<div class="over-actions">' +
          '<button class="btn-primary" id="share-daily">Share result</button>' +
          '<button class="btn-secondary" id="view-daily">View today’s result</button>' +
          '<button class="btn-secondary" id="practice-daily-result">Practise again</button>' +
          '<button class="btn-secondary" id="settings-btn">Change game settings</button>' +
          '<button class="btn-cta" id="share-game">' + esc(DONO_CONFIG.ctaButtonLabel) + '</button>' +
        '</div>' +
        '<p class="share-status" id="share-status" role="status" aria-live="polite"></p>' +
        '<div class="cta-block"><p>' + esc(DONO_CONFIG.endOfGameCta) + '</p></div>' +
        '<p class="daily-limitation">This static Daily Challenge uses local browser storage for casual one-attempt tracking. It is not secure anti-cheat or cross-device enforcement.</p>' +
      '</div>';
    document.getElementById('share-daily').addEventListener('click', shareDailyResult);
    document.getElementById('share-game').addEventListener('click', shareGame);
    document.getElementById('view-daily').addEventListener('click', () => {
      const saved = loadTodayDailyState();
      if (saved) dailyGame = core.createDailyGame(dailyUniversities, dailyOptions(), saved);
      renderDailyGameOver();
    });
    document.getElementById('practice-daily-result').addEventListener('click', () => startDailyPractice());
    document.getElementById('settings-btn').addEventListener('click', renderLanding);
    document.getElementById('share-daily').focus();
    announce('Daily Challenge complete. Final score ' + s.score + '. Longest streak ' + s.bestStreak + '.');
  }

  function fallbackCopy(text) {
    const area = document.createElement('textarea');
    area.value = text;
    area.setAttribute('readonly', '');
    area.style.position = 'fixed';
    area.style.top = '-1000px';
    document.body.appendChild(area);
    area.select();
    let copied = false;
    try { copied = document.execCommand('copy'); } catch (e) { copied = false; }
    document.body.removeChild(area);
    return copied;
  }

  function shareDailyResult() {
    const status = document.getElementById('share-status');
    const text = core.createDailyShareText(dailyGame.state);
    const done = () => {
      status.textContent = 'Result copied without spoilers.';
      announce('Daily Challenge result copied.');
    };
    const fail = () => {
      status.textContent = 'Copy unavailable. Select and copy: ' + text.replace(/\n/g, ' / ');
    };
    if (navigator.share) {
      navigator.share({ title: 'Dono Daily Challenge', text }).then(done).catch(() => fallbackCopy(text) ? done() : fail());
    } else if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text) ? done() : fail());
    } else if (fallbackCopy(text)) {
      done();
    } else {
      fail();
    }
  }

  function shareGame() {
    const status = document.getElementById('share-status');
    const url = window.location.href.split('#')[0];
    const text = 'Try Dono Higher or Lower — University Rankings: ' + url;
    const done = () => {
      if (status) status.textContent = 'Game link copied.';
      announce('Game link copied.');
    };
    const fail = () => {
      if (status) status.textContent = 'Copy unavailable. Share this link: ' + url;
    };
    if (navigator.share) {
      navigator.share({ title: 'Dono Higher or Lower', text: 'Can you beat my university rankings score?', url }).then(done).catch(() => {});
    } else if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text) ? done() : fail());
    } else if (fallbackCopy(text)) {
      done();
    } else {
      fail();
    }
  }

  function renderGameOver() {
    if (!game) return;
    clearTimers();
    busy = false;
    const s = game.state;
    writeBest(s.config, s.score);
    const ended = s.endedByComparison ? '<p class="ended-line">Ended on: ' + esc(relationText(s.endedByComparison)) + '</p>' : '';
    app.innerHTML =
      '<div class="screen over">' +
        '<p class="over-kicker">' + esc(configSummary(s.config)) + ' · results</p>' +
        '<h2>' + (s.config.format === core.FORMAT.TIMED ? 'Time up.' : 'Final score.') + '</h2>' +
        '<div class="over-stats">' + resultStats() + '</div>' + ended +
        '<div class="over-actions">' +
          '<button class="btn-primary" id="again-btn">Play again</button>' +
          '<button class="btn-secondary" id="settings-btn">Change game settings</button>' +
          '<button class="btn-cta" id="share-game">' + esc(DONO_CONFIG.ctaButtonLabel) + '</button>' +
        '</div>' +
        '<p class="share-status" id="share-status" role="status" aria-live="polite"></p>' +
        '<div class="cta-block"><p>' + esc(DONO_CONFIG.endOfGameCta) + '</p></div>' +
      '</div>';
    document.getElementById('again-btn').addEventListener('click', startGame);
    document.getElementById('settings-btn').addEventListener('click', renderLanding);
    document.getElementById('share-game').addEventListener('click', shareGame);
    document.getElementById('again-btn').focus();
    announce('Game over. Final score ' + s.score + '. Longest streak ' + s.bestStreak + '.');
  }

  document.addEventListener('keydown', (event) => {
    if ((!game && !dailyGame) || (event.target && /^(input|textarea|select)$/i.test(event.target.tagName))) return;
    const key = event.key.toLowerCase();
    if (dailyGame) {
      if (dailyGame.state.phase === 'guessing') {
        if (key === 'h' || key === 'arrowup') { event.preventDefault(); onDailyGuess(true); }
        if (key === 'l' || key === 'arrowdown') { event.preventDefault(); onDailyGuess(false); }
      } else if (dailyGame.state.phase === 'revealed' && (key === 'enter' || key === ' ')) {
        if (document.activeElement !== document.getElementById('next-btn')) {
          event.preventDefault();
          onDailyNext();
        }
      }
      return;
    }
    if (game.state.phase === 'guessing') {
      if (key === 'h' || key === 'arrowup') { event.preventDefault(); onGuess(true); }
      if (key === 'l' || key === 'arrowdown') { event.preventDefault(); onGuess(false); }
    } else if (game.state.phase === 'revealed' && game.state.config.format !== core.FORMAT.TIMED && (key === 'enter' || key === ' ')) {
      if (document.activeElement !== document.getElementById('next-btn')) {
        event.preventDefault();
        onNext();
      }
    }
  });

  if (dataset.error || universities.length < 3) {
    renderError(dataset.error || 'The rankings data contains fewer than three universities with exact numerical ranks.');
  } else {
    renderLanding();
  }
})();

</script>
</body>
</html>
